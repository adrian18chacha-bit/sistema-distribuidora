<div class="grid grid-cols-1 lg:grid-cols-2 gap-8 text-left h-full">
    <div class="space-y-6">
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-[2rem] shadow-sm">
            <h3 class="font-bold mb-6 flex items-center gap-3 text-slate-900 dark:text-white text-lg">
                <div class="w-1.5 h-6 bg-slate-900 dark:bg-white rounded-full"></div>
                Datos de la Empresa
            </h3>
            <p class="text-sm text-slate-500 dark:text-slate-400 mb-6">Esta información aparecerá en la cabecera del sistema y en los recibos generados.</p>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wide ml-2">Nombre de la Empresa</label>
                    <input type="text" id="config-nombre" placeholder="Ej. Comercializadora San Juan" class="w-full p-4 mt-1 bg-slate-50 dark:bg-slate-800 dark:text-white rounded-xl border border-slate-200 dark:border-slate-700 text-sm focus:ring-2 focus:ring-slate-900 dark:focus:ring-slate-400 outline-none transition-all">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wide ml-2">RUC / NIT</label>
                    <input type="text" id="config-ruc" placeholder="Número de documento de la empresa" class="w-full p-4 mt-1 bg-slate-50 dark:bg-slate-800 dark:text-white rounded-xl border border-slate-200 dark:border-slate-700 text-sm focus:ring-2 focus:ring-slate-900 dark:focus:ring-slate-400 outline-none transition-all">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wide ml-2">Dirección Principal</label>
                    <input type="text" id="config-direccion" placeholder="Calle, Ciudad, País" class="w-full p-4 mt-1 bg-slate-50 dark:bg-slate-800 dark:text-white rounded-xl border border-slate-200 dark:border-slate-700 text-sm focus:ring-2 focus:ring-slate-900 dark:focus:ring-slate-400 outline-none transition-all">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wide ml-2">Teléfono / WhatsApp</label>
                    <input type="text" id="config-telefono" placeholder="+51 999 888 777" class="w-full p-4 mt-1 bg-slate-50 dark:bg-slate-800 dark:text-white rounded-xl border border-slate-200 dark:border-slate-700 text-sm focus:ring-2 focus:ring-slate-900 dark:focus:ring-slate-400 outline-none transition-all">
                </div>
                <button onclick="guardarConfiguracion()" class="w-full bg-slate-900 dark:bg-white hover:bg-slate-800 dark:hover:bg-slate-200 text-white dark:text-slate-900 font-bold py-4 mt-4 rounded-xl shadow-md active:scale-95 transition-all">
                    Guardar Cambios
                </button>
            </div>
        </div>
    </div>
</div>
