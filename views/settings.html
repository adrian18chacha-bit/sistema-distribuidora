<div class="grid grid-cols-1 lg:grid-cols-2 gap-8 text-left">
    <div class="space-y-8">
        <div class="backdrop-blur-xl bg-white/60 dark:bg-slate-900/40 border border-white/20 dark:border-white/5 p-7 rounded-[2rem] shadow-xl relative overflow-hidden group">
            <div class="absolute -right-10 -top-10 w-40 h-40 bg-purple-500/10 rounded-full blur-3xl group-hover:bg-purple-500/20 transition-all duration-500"></div>
            <h3 class="font-bold mb-6 flex items-center gap-2 text-slate-900 dark:text-white text-md tracking-tight relative z-10">
                <div class="w-2 h-6 bg-purple-500 rounded-full shadow-[0_0_10px_rgba(168,85,247,0.8)]"></div>
                Datos de la Empresa (Marca Blanca)
            </h3>
            <p class="text-sm text-slate-500 dark:text-slate-400 mb-6 relative z-10">Esta información aparecerá en la cabecera del sistema y en las facturas PDF.</p>
            <div class="space-y-4 relative z-10">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wide ml-2">Nombre de la Empresa</label>
                    <input type="text" id="config-nombre" placeholder="Ej. Comercializadora San Juan" class="w-full p-4 mt-1 bg-white/50 dark:bg-slate-800/50 dark:text-white rounded-2xl border border-white/20 dark:border-white/10 text-sm focus:ring-2 focus:ring-purple-500 outline-none backdrop-blur-sm transition-all hover:bg-white/80 dark:hover:bg-slate-800/80">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wide ml-2">RUC / NIT</label>
                    <input type="text" id="config-ruc" placeholder="Número de documento de la empresa" class="w-full p-4 mt-1 bg-white/50 dark:bg-slate-800/50 dark:text-white rounded-2xl border border-white/20 dark:border-white/10 text-sm focus:ring-2 focus:ring-purple-500 outline-none backdrop-blur-sm transition-all hover:bg-white/80 dark:hover:bg-slate-800/80">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wide ml-2">Dirección Principal</label>
                    <input type="text" id="config-direccion" placeholder="Calle, Ciudad, País" class="w-full p-4 mt-1 bg-white/50 dark:bg-slate-800/50 dark:text-white rounded-2xl border border-white/20 dark:border-white/10 text-sm focus:ring-2 focus:ring-purple-500 outline-none backdrop-blur-sm transition-all hover:bg-white/80 dark:hover:bg-slate-800/80">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wide ml-2">Teléfono / WhatsApp</label>
                    <input type="text" id="config-telefono" placeholder="+51 999 888 777" class="w-full p-4 mt-1 bg-white/50 dark:bg-slate-800/50 dark:text-white rounded-2xl border border-white/20 dark:border-white/10 text-sm focus:ring-2 focus:ring-purple-500 outline-none backdrop-blur-sm transition-all hover:bg-white/80 dark:hover:bg-slate-800/80">
                </div>
                <button onclick="guardarConfiguracion()" class="w-full bg-gradient-to-r from-purple-500 to-indigo-500 hover:from-purple-400 hover:to-indigo-400 text-white font-bold py-4 mt-4 rounded-2xl shadow-[0_0_20px_rgba(168,85,247,0.4)] active:scale-95 transition-all text-shadow">Guardar Cambios</button>
            </div>
        </div>
    </div>
</div>
