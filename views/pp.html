<div class="grid grid-cols-1 lg:grid-cols-3 gap-8 text-left h-full">
    <!-- Panel Izquierdo: Formulario -->
    <div class="lg:col-span-1 space-y-6">
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-[2rem] shadow-sm">
            <h3 class="font-black mb-6 flex items-center gap-3 text-slate-900 dark:text-white text-lg">
                <div class="w-1.5 h-6 bg-yellow-500 rounded-full"></div> Planificación Producción
            </h3>
            <div class="space-y-4">
                <select id="pp-producto" class="w-full p-3 bg-slate-50 dark:bg-slate-800 dark:text-white rounded-xl outline-none border border-slate-200 dark:border-slate-700 focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 text-sm transition-all">
                    <option value="">Seleccionar producto (Inventario)</option>
                </select>
                <input type="number" id="pp-cantidad" placeholder="Cantidad" class="w-full p-3 bg-slate-50 dark:bg-slate-800 dark:text-white rounded-xl outline-none border border-slate-200 dark:border-slate-700 focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 text-sm transition-all">
                <input type="date" id="pp-fecha" class="w-full p-3 bg-slate-50 dark:bg-slate-800 dark:text-white rounded-xl outline-none border border-slate-200 dark:border-slate-700 focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 text-sm transition-all">
                <select id="pp-estado" class="w-full p-3 bg-slate-50 dark:bg-slate-800 dark:text-white rounded-xl outline-none border border-slate-200 dark:border-slate-700 focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 text-sm transition-all">
                    <option value="PROGRAMADO">PROGRAMADO</option>
                    <option value="EN_PROCESO">EN PROCESO</option>
                    <option value="COMPLETADO">COMPLETADO</option>
                </select>
                <button onclick="guardarOrdenPP()" class="w-full bg-yellow-500 hover:bg-slate-800 dark:hover:bg-slate-200 text-white font-bold py-3.5 rounded-xl shadow-md active:scale-95 transition-all mt-2">Crear Orden</button>
            </div>
        </div>
    </div>

    <!-- Panel Derecho: Lista de Órdenes -->
    <div class="lg:col-span-2">
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[2rem] shadow-sm flex flex-col h-full min-h-[500px]">
            <div class="p-6 md:p-8 border-b border-slate-100 dark:border-slate-800 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                    <h3 class="font-black text-slate-900 dark:text-white text-xl">Órdenes de Producción</h3>
                    <p class="text-sm text-slate-500 mt-1">Gestiona pedidos planificados y su avance.</p>
                </div>
                <div class="relative flex-1 md:max-w-xs w-full">
                    <svg class="w-4 h-4 absolute left-3 top-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" id="buscador-pp" onkeyup="filtrarPP()" placeholder="Buscar orden..." class="w-full pl-9 pr-4 py-2.5 bg-slate-50 dark:bg-slate-800 dark:text-white rounded-full text-sm outline-none border border-slate-200 dark:border-slate-700 focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 transition-all">
                </div>
            </div>
            
            <div class="hidden md:grid grid-cols-12 gap-4 px-8 py-3 bg-slate-50 dark:bg-slate-800/50 border-b border-slate-100 dark:border-slate-800 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                <div class="col-span-3">Orden</div>
                <div class="col-span-3">Producto</div>
                <div class="col-span-2 text-center">Entrega</div>
                <div class="col-span-2 text-center">Estado</div>
                <div class="col-span-2 text-center">Acción</div>
            </div>

            <div class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4 custom-scrollbar" id="body-pp">
                <!-- Tarjetas de órdenes de producción -->
            </div>
        </div>
    </div>
</div>
