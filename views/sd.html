�<div class="grid grid-cols-1 lg:grid-cols-3 gap-8 text-left h-full">
    <!-- Panel Izquierdo: Formulario -->
    <div class="lg:col-span-1 space-y-6">
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-[2rem] shadow-sm">
            <h3 class=" mb-6 flex items-center gap-3 text-slate-900 dark:text-white text-lg">
                <div class="w-1.5 h-6 bg-slate-900 dark:bg-white rounded-full"></div>
                Registrar Pedido
            </h3>
            <div class="space-y-4">
                <select id="cliente-select" onchange="toggleNuevoCliente()" class="w-full p-3 bg-slate-50 dark:bg-slate-800 dark:text-white rounded-xl outline-none border border-slate-200 dark:border-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-sm transition-all">
                    <option value="">Seleccionar cliente</option>
                    <option value="NUEVO">+ Cliente Nuevo</option>

                    <input type="text" id="cliente-nuevo" placeholder="Nombre completo o Razón Social" class="w-full p-3 bg-white dark:bg-slate-900 dark:text-white rounded-xl outline-none border border-slate-200 dark:border-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-sm transition-all">
                    <div class="grid grid-cols-2 gap-2">
                        <div class="flex">
                            <select id="tipo-documento" class="w-1/3 p-3 bg-white dark:bg-slate-900 dark:text-white rounded-l-xl outline-none border border-slate-200 dark:border-slate-700 text-sm border-r-0 focus:ring-1 focus:ring-blue-500">
                                <option value="DNI">DNI</option>
                                <option value="RUC">RUC</option>
                            </select>
                            <input type="text" id="numero-documento" placeholder="Nro Doc." class="w-2/3 p-3 bg-white dark:bg-slate-900 dark:text-white rounded-r-xl outline-none border border-slate-200 dark:border-slate-700 text-sm focus:ring-1 focus:ring-blue-500">
                        </div>
                        <input type="tel" id="celular-nuevo" placeholder="Celular (Opcional)" class="w-full p-3 bg-white dark:bg-slate-900 dark:text-white rounded-xl outline-none border border-slate-200 dark:border-slate-700 text-sm focus:ring-1 focus:ring-blue-500">
                    </div>
                </div>
                
                <select id="producto-select" onchange="toggleNuevoProducto()" class="w-full p-3 bg-slate-50 dark:bg-slate-800 dark:text-white rounded-xl outline-none border border-slate-200 dark:border-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-sm transition-all">
                    <option value="">Seleccionar producto (Inventario)</option>
                    <option value="NUEVO">+ Producto Libre</option>
                </select>
                <input type="text" id="producto-nuevo" placeholder="Nombre del producto libre" class="hidden w-full p-3 bg-slate-50 dark:bg-slate-800 dark:text-white rounded-xl outline-none border border-slate-200 dark:border-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-sm transition-all">
                
                <div class="flex gap-4">
                    <input type="number" id="cantidad" placeholder="Cantidad" value="1" min="1" class="w-1/3 p-3 bg-slate-50 dark:bg-slate-800 dark:text-white rounded-xl outline-none border border-slate-200 dark:border-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-sm transition-all">
                    <input type="number" id="precio" placeholder="Precio Total S/." class="w-2/3 p-3 bg-slate-50 dark:bg-slate-800 dark:text-white rounded-xl outline-none border border-slate-200 dark:border-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-sm transition-all">
                </div>
                
                <select id="tipo-comprobante" class="w-full p-3 bg-slate-50 dark:bg-slate-800 dark:text-white rounded-xl outline-none border border-slate-200 dark:border-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-sm transition-all">
                    <option value="Nota de Venta">Nota de Venta (Interno)</option>

                </select>

                    Guardar Pedido
                </button>
            </div>
        </div>
        
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-[2rem] flex flex-col items-center justify-center shadow-sm">
            <div class="w-full">
                <div class="flex items-center justify-between mb-3">
                    <p class="text-[10px]  text-slate-400 uppercase tracking-widest">Distribución Pedidos</p>
                </div>
                <div class="h-48 relative">
                    <canvas id="graficoEntregas"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Panel Derecho: Lista de Ventas -->
    <div class="lg:col-span-2">
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[2rem] shadow-sm flex flex-col h-full min-h-[500px]">
            <div class="p-6 md:p-8 border-b border-slate-100 dark:border-slate-800 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <h3 class=" text-slate-900 dark:text-white text-xl" id="titulo-seccion">Registros de Ventas</h3>
                <div class="flex gap-3 w-full md:w-auto flex-1 md:max-w-2xl flex-wrap">
                    <div class="relative flex-1 min-w-[140px]">
                        <svg class="w-4 h-4 absolute left-3 top-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <input type="text" id="buscador" onkeyup="filtrarPedidos()" placeholder="Buscar cliente..." class="w-full pl-9 pr-4 py-2.5 bg-slate-50 dark:bg-slate-800 dark:text-white rounded-full text-sm outline-none border border-slate-200 dark:border-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                    </div>
                    <input type="date" id="filtro-fecha-desde" onchange="filtrarPedidos()" class="px-3 py-2.5 bg-slate-50 dark:bg-slate-800 dark:text-white rounded-full text-xs outline-none border border-slate-200 dark:border-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all" title="Desde">
                    <input type="date" id="filtro-fecha-hasta" onchange="filtrarPedidos()" class="px-3 py-2.5 bg-slate-50 dark:bg-slate-800 dark:text-white rounded-full text-xs outline-none border border-slate-200 dark:border-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all" title="Hasta">
                    <button onclick="exportarExcelReal()" id="btn-excel" class="bg-blue-600 hover:bg-blue-700 text-white text-white px-5 rounded-full  text-xs shadow-sm transition-all whitespace-nowrap active:scale-95 flex items-center gap-1">
                        EXCEL
                    </button>
                </div>
            </div>
            
            <!-- Encabezados Opcionales para alinear -->
            <div class="hidden md:grid grid-cols-12 gap-4 px-8 py-3 bg-slate-50 dark:bg-slate-800/50 border-b border-slate-100 dark:border-slate-800 text-[10px]  text-slate-400 uppercase tracking-widest">
                <div class="col-span-4">Cliente</div>
                <div class="col-span-3 text-center">Total</div>
                <div class="col-span-2 text-center">Estado</div>
                <div class="col-span-3 text-right">Acciones</div>
            </div>

            <!-- Contenedor de Tarjetas (Reemplaza a la tabla) -->
            <div class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4 custom-scrollbar" id="body-tabla">
                <!-- Tarjetas inyectadas por JS -->
            </div>
        </div>
    </div>
</div>
