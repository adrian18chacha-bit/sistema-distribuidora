<div class="grid grid-cols-1 lg:grid-cols-3 gap-8 text-left h-full">
    <div class="lg:col-span-1 space-y-6">
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-[2rem] shadow-sm">
            <h3 class="font-bold mb-6 flex items-center gap-3 text-slate-900 dark:text-white text-lg">
                <div class="w-1.5 h-6 bg-blue-500 text-white rounded-full"></div> Registrar Gasto
            </h3>
            <div class="space-y-4">
                <input type="text" id="gasto-desc" placeholder="Descripción del gasto" class="w-full p-3 bg-slate-50 dark:bg-slate-800 dark:text-white rounded-xl outline-none border border-slate-200 dark:border-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-sm transition-all">
                <input type="number" id="gasto-monto" placeholder="Monto S/." class="w-full p-3 bg-slate-50 dark:bg-slate-800 dark:text-white rounded-xl outline-none border border-slate-200 dark:border-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-sm transition-all">
                <button onclick="guardarGasto()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3.5 rounded-xl shadow-md active:scale-95 transition-all mt-2">Guardar Gasto</button>
            </div>
        </div>
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-[2rem] flex flex-col items-center justify-center shadow-sm">
            <div class="w-full">
                <div class="flex items-center justify-between mb-3">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Ventas por Mes</p>
                </div>
                <div class="h-48 relative w-full">
                    <canvas id="graficoVentasMes"></canvas>
                </div>
            </div>
        </div>
    </div>
    <div class="lg:col-span-2">
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[2rem] shadow-sm flex flex-col h-full min-h-[500px]">
            <div class="p-6 md:p-8 border-b border-slate-100 dark:border-slate-800 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <h3 class="font-bold text-slate-900 dark:text-white text-xl">Registros de Gastos</h3>
                <div class="flex gap-3 w-full md:w-auto flex-1 md:max-w-md">
                    <div class="relative flex-1">
                        <svg class="w-4 h-4 absolute left-3 top-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <input type="text" id="buscador-gastos" onkeyup="filtrarGastos()" placeholder="Buscar gasto..." class="w-full pl-9 pr-4 py-2.5 bg-slate-50 dark:bg-slate-800 dark:text-white rounded-full text-sm outline-none border border-slate-200 dark:border-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                    </div>
                    <button onclick="exportarGastosExcel()" class="bg-blue-500 hover:bg-blue-600 text-white text-white px-5 rounded-full font-bold text-xs shadow-sm transition-all whitespace-nowrap active:scale-95 flex items-center gap-1">EXCEL</button>
                </div>
            </div>
            
            <div class="hidden md:grid grid-cols-12 gap-4 px-8 py-3 bg-slate-50 dark:bg-slate-800/50 border-b border-slate-100 dark:border-slate-800 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                <div class="col-span-6">Gasto</div>
                <div class="col-span-3 text-center">Monto</div>
                <div class="col-span-3 text-center">Acción</div>
            </div>

            <div class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4 custom-scrollbar" id="body-gastos">
                <!-- Tarjetas de gastos se inyectan aquí -->
            </div>
        </div>
    </div>
</div>
