<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribuidora Chávez | Sistema Integral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        .transition-theme { transition: background-color 0.3s, border-color 0.3s, color 0.3s; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 min-h-screen text-slate-900 dark:text-slate-100 transition-theme">

<div id="auth-section" class="flex items-center justify-center min-h-screen px-4">
    <div class="bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-100 dark:border-slate-700">
        <div class="text-center mb-8">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg">
                <span class="text-white text-3xl font-bold">D</span>
            </div>
            <h1 class="text-2xl font-bold dark:text-white uppercase tracking-wider">Distribuidora Chávez</h1>
        </div>
        <div class="space-y-4 text-left">
            <input type="email" id="login-email" placeholder="Correo" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-600 dark:bg-slate-700 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            <input type="password" id="login-password" placeholder="Contraseña" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-600 dark:bg-slate-700 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition-all">Entrar</button>
        </div>
    </div>
</div>

<div id="app-section" class="hidden">
    <nav class="bg-blue-700 dark:bg-blue-900 text-white shadow-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <h2 class="text-lg font-bold tracking-tight uppercase">Distribuidora Chávez</h2>
            <div class="flex items-center gap-2">
                <button onclick="toggleDarkMode()" class="p-2 bg-white/10 hover:bg-white/20 rounded-lg transition-all">
                    <svg id="sun-icon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/></svg>
                    <svg id="moon-icon" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
                </button>
                <div class="flex bg-blue-800/50 rounded-xl p-1">
                    <button onclick="cambiarPestana('ventas')" id="btn-tab-ventas" class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all">Ventas</button>
                    <button onclick="cambiarPestana('gastos')" id="btn-tab-gastos" class="px-3 py-1.5 rounded-lg text-xs font-bold text-blue-200 transition-all">Gastos</button>
                </div>
                <button onclick="logout()" class="p-2 bg-white/10 hover:bg-rose-500 rounded-lg transition-all">✕</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border-l-4 border-l-blue-500 border border-slate-100 dark:border-slate-700">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Ventas</p>
                <h4 class="text-2xl font-bold text-blue-600 dark:text-blue-400" id="resumen-ventas">S/. 0.00</h4>
            </div>
            <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border-l-4 border-l-rose-500 border border-slate-100 dark:border-slate-700">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Gastos</p>
                <h4 class="text-2xl font-bold text-rose-500" id="resumen-gastos">S/. 0.00</h4>
            </div>
            <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border-l-4 border-l-emerald-500 border border-slate-100 dark:border-slate-700">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Utilidad</p>
                <h4 class="text-2xl font-bold text-emerald-600 dark:text-emerald-400" id="resumen-utilidad">S/. 0.00</h4>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 text-left">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700">
                    <div id="form-ventas">
                        <h3 class="text-md font-bold mb-5 flex items-center gap-2 dark:text-white"><div class="w-1.5 h-5 bg-blue-600 rounded-full"></div> Registrar Venta</h3>
                        <div class="space-y-4">
                            <select id="cliente-select" onchange="toggleNuevoCliente()" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-700 dark:text-white rounded-xl ring-1 ring-slate-200 dark:ring-slate-600 outline-none">
                                <option value="">Seleccionar cliente</option><option value="NUEVO">+ Nuevo</option>
                            </select>
                            <input type="text" id="cliente-nuevo" placeholder="Nombre completo" class="hidden w-full px-4 py-3 bg-white dark:bg-slate-700 dark:text-white border-2 border-blue-50 dark:border-slate-600 rounded-xl outline-none">
                            <input type="text" id="producto" placeholder="Producto" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-700 dark:text-white rounded-xl ring-1 ring-slate-200 dark:ring-slate-600 outline-none">
                            <input type="number" id="precio" placeholder="S/. 0.00" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-700 dark:text-white rounded-xl ring-1 ring-slate-200 dark:ring-slate-600 outline-none">
                            <button onclick="guardarPedido()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all">Guardar Venta</button>
                        </div>
                    </div>
                    <div id="form-gastos" class="hidden">
                        <h3 class="text-md font-bold mb-5 flex items-center gap-2 dark:text-white"><div class="w-1.5 h-5 bg-rose-500 rounded-full"></div> Registrar Gasto</h3>
                        <div class="space-y-4">
                            <input type="text" id="gasto-desc" placeholder="Descripción" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-700 dark:text-white rounded-xl ring-1 ring-slate-200 dark:ring-slate-600 outline-none">
                            <input type="number" id="gasto-monto" placeholder="S/. 0.00" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-700 dark:text-white rounded-xl ring-1 ring-slate-200 dark:ring-slate-600 outline-none">
                            <button onclick="guardarGasto()" class="w-full bg-rose-500 hover:bg-rose-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all">Guardar Gasto</button>
                        </div>
                    </div>
                </div>
                <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700 h-44"><canvas id="graficoEntregas"></canvas></div>
            </div>

            <div class="lg:col-span-8">
                <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700 overflow-hidden">
                    <div class="p-6 border-b dark:border-slate-700 flex flex-col md:flex-row justify-between items-center gap-4 bg-white dark:bg-slate-800">
                        <h3 class="font-bold dark:text-white" id="titulo-seccion">Historial de Ventas</h3>
                        <div class="flex gap-2 w-full md:w-auto">
                            <input type="text" id="buscador" onkeyup="filtrarPedidos()" placeholder="Buscar..." class="px-4 py-2 bg-slate-50 dark:bg-slate-700 dark:text-white rounded-xl text-sm ring-1 ring-slate-200 dark:ring-slate-600 outline-none w-full md:w-48">
                            <button onclick="exportarExcelReal()" class="bg-emerald-500 text-white px-4 rounded-xl text-sm font-bold shadow-md shadow-emerald-200">Excel</button>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead class="bg-slate-50 dark:bg-slate-700/50 text-slate-400 font-bold uppercase text-[10px]">
                                <tr id="header-tabla"></tr>
                            </thead>
                            <tbody id="body-tabla" class="divide-y divide-slate-50 dark:divide-slate-700"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const _supabase = supabase.createClient('https://ozdpcjhwbdsuqncgxfpz.supabase.co', 'sb_publishable_aBgdzg-JTQ61i1IkjUYysQ_4lYYJGPQ');
    let pedidosActuales = []; let gastosActuales = []; let chartObj = null;

    function toggleDarkMode() {
        const h = document.documentElement; h.classList.toggle('dark');
        const isD = h.classList.contains('dark');
        document.getElementById('sun-icon').classList.toggle('hidden', !isD);
        document.getElementById('moon-icon').classList.toggle('hidden', isD);
        localStorage.setItem('theme', isD ? 'dark' : 'light');
    }
    if (localStorage.getItem('theme') === 'dark') toggleDarkMode();

    function cambiarPestana(tab) {
        const v = tab === 'ventas';
        document.getElementById('form-ventas').classList.toggle('hidden', !v);
        document.getElementById('form-gastos').classList.toggle('hidden', v);
        document.getElementById('titulo-seccion').textContent = v ? "Historial de Ventas" : "Registro de Gastos";
        document.getElementById('btn-tab-ventas').className = v ? "px-3 py-1.5 rounded-lg text-xs font-bold bg-white text-blue-700 shadow-sm" : "px-3 py-1.5 rounded-lg text-xs font-bold text-blue-200 hover:text-white";
        document.getElementById('btn-tab-gastos').className = !v ? "px-3 py-1.5 rounded-lg text-xs font-bold bg-white text-rose-600 shadow-sm" : "px-3 py-1.5 rounded-lg text-xs font-bold text-blue-200 hover:text-white";
        actualizarInterfaz();
    }

    async function login() {
        const e = document.getElementById('login-email').value;
        const p = document.getElementById('login-password').value;
        const { error } = await _supabase.auth.signInWithPassword({ email: e, password: p });
        if (!error) checkUser(); else alert("Error de acceso");
    }
    async function logout() { await _supabase.auth.signOut(); location.reload(); }

    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            cambiarPestana('ventas'); cargarTodo();
        }
    }

    async function cargarTodo() {
        const { data: p } = await _supabase.from('pedidos').select('*').order('creado_en', { ascending: false });
        const { data: g } = await _supabase.from('gastos').select('*').order('creado_en', { ascending: false });
        pedidosActuales = p || []; gastosActuales = g || [];
        actualizarInterfaz();
    }

    function enviarWhatsApp(c, pr, t) {
        const msg = encodeURIComponent(`¡Hola ${c}! 👋 Confirmamos tu pedido de ${pr} por S/. ${t.toFixed(2)}. ¡Gracias! 🚛 Distribuidora Chávez`);
        window.open(`https://api.whatsapp.com/send?text=${msg}`, '_blank');
    }

    function actualizarInterfaz() {
        const isV = !document.getElementById('form-ventas').classList.contains('hidden');
        const h = document.getElementById('header-tabla');
        const b = document.getElementById('body-tabla'); b.innerHTML = '';
        let tV = 0, tG = 0, pen = 0, ent = 0;
        pedidosActuales.forEach(p => { tV += p.precio_total; p.entregado ? ent++ : pen++; });
        gastosActuales.forEach(g => tG += g.monto);
        document.getElementById('resumen-ventas').textContent = `S/. ${tV.toFixed(2)}`;
        document.getElementById('resumen-gastos').textContent = `S/. ${tG.toFixed(2)}`;
        document.getElementById('resumen-utilidad').textContent = `S/. ${(tV - tG).toFixed(2)}`;

        if (isV) {
            h.innerHTML = '<th class="px-6 py-4">Cliente</th><th class="px-6 py-4 text-center">Total</th><th class="px-6 py-4 text-center">Estado</th><th class="px-6 py-4 text-center">Acciones</th>';
            pedidosActuales.forEach(p => {
                b.innerHTML += `<tr class="hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors"><td class="px-6 py-4 font-bold dark:text-white">${p.cliente}<br><span class="text-[10px] text-slate-400 font-normal uppercase">${p.producto}</span></td><td class="px-6 py-4 text-center font-black text-blue-600 dark:text-blue-400 whitespace-nowrap">S/. ${p.precio_total.toFixed(2)}</td><td class="px-6 py-4 text-center"><span class="px-2 py-1 rounded-lg text-[10px] font-black ${p.entregado ? 'bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400' : 'bg-amber-50 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400'}">${p.entregado ? 'LISTO' : 'PENDIENTE'}</span></td><td class="px-6 py-4 flex justify-center items-center gap-1">
                <button onclick="enviarWhatsApp('${p.cliente}', '${p.producto}', ${p.precio_total})" class="p-2 text-emerald-500 hover:bg-emerald-50 dark:hover:bg-emerald-900/20 rounded-lg">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.28
