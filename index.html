<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribuidora Chávez | Panel Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

<div id="auth-section" class="flex items-center justify-center min-h-screen px-4">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-100">
        <div class="text-center mb-8">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg shadow-blue-200">
                <span class="text-white text-3xl font-bold">D</span>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Distribuidora Chávez</h1>
            <p class="text-slate-500 text-sm mt-1">Ingresa al sistema administrativo</p>
        </div>
        <div class="space-y-4">
            <input type="email" id="login-email" placeholder="Correo electrónico" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
            <input type="password" id="login-password" placeholder="Contraseña" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
            <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-200 transition-all active:scale-95">Iniciar Sesión</button>
        </div>
    </div>
</div>

<div id="app-section" class="hidden">
    <nav class="bg-blue-700 text-white shadow-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-2 rounded-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                </div>
                <h2 class="text-xl font-bold tracking-tight">DISTRIBUIDORA CHÁVEZ</h2>
            </div>
            <button onclick="logout()" class="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-lg text-sm font-semibold transition-all">Cerrar Sesión</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4 space-y-8">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <h3 class="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                        <span class="w-2 h-6 bg-blue-600 rounded-full"></span>
                        Nuevo Registro
                    </h3>
                    
                    <div class="space-y-5">
                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase mb-2 block">Nombre del Cliente</label>
                            <select id="cliente-select" onchange="toggleNuevoCliente()" class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                                <option value="">Seleccionar cliente</option>
                                <option value="NUEVO" class="text-blue-600 font-bold">+ Agregar nuevo</option>
                            </select>
                            <input type="text" id="cliente-nuevo" placeholder="Nombre completo" class="hidden mt-3 w-full px-4 py-3 bg-white rounded-xl border-2 border-blue-100 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>

                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase mb-2 block">Producto / Pedido</label>
                            <input type="text" id="producto" placeholder="Ej: Bidón 20L" class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>

                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase mb-2 block">Precio Final (S/.)</label>
                            <input type="number" id="precio" placeholder="0.00" class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>

                        <button onclick="guardarPedido()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-100 transition-all transform active:scale-95">Guardar Pedido</button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-center">
                    <h3 class="text-sm font-bold text-slate-400 uppercase mb-4 text-left">Resumen de Entregas</h3>
                    <div class="relative h-48">
                        <canvas id="graficoEntregas"></canvas>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="p-6 border-b border-slate-50 flex items-center justify-between bg-white">
                        <h3 class="font-bold text-slate-800 text-lg">Historial de Ventas</h3>
                        <button onclick="exportarExcelReal()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-md shadow-emerald-100 transition-all flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                            Exportar Excel
                        </button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-slate-50 text-slate-400 text-xs font-bold uppercase">
                                <tr>
                                    <th class="px-6 py-4 text-left">Cliente</th>
                                    <th class="px-6 py-4 text-center">Producto</th>
                                    <th class="px-6 py-4 text-center">Total</th>
                                    <th class="px-6 py-4 text-center">Estado</th>
                                    <th class="px-6 py-4 text-center">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-pedidos" class="divide-y divide-slate-50">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const _supabase = supabase.createClient('https://ozdpcjhwbdsuqncgxfpz.supabase.co', 'sb_publishable_aBgdzg-JTQ61i1IkjUYysQ_4lYYJGPQ');
    let pedidosActuales = [];
    let chartObj = null;

    function renderChart(p, e) {
        const ctx = document.getElementById('graficoEntregas').getContext('2d');
        if (chartObj) chartObj.destroy();
        chartObj = new Chart(ctx, {
            type: 'doughnut',
            data: { 
                labels: ['Pendiente', 'Listo'], 
                datasets: [{ 
                    data: [p, e], 
                    backgroundColor: ['#f59e0b', '#10b981'],
                    hoverOffset: 4,
                    borderWidth: 0
                }] 
            },
            options: { 
                maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20 } } },
                cutout: '70%'
            }
        });
    }

    function toggleNuevoCliente() {
        const s = document.getElementById('cliente-select');
        const i = document.getElementById('cliente-nuevo');
        s.value === "NUEVO" ? i.classList.remove('hidden') : i.classList.add('hidden');
    }

    async function login() {
        const e = document.getElementById('login-email').value;
        const p = document.getElementById('login-password').value;
        const { error } = await _supabase.auth.signInWithPassword({ email: e, password: p });
        if (!error) checkUser(); else alert("Error de acceso");
    }

    async function logout() { await _supabase.auth.signOut(); location.reload(); }

    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            cargarPedidos();
        }
    }

    async function cargarPedidos() {
        const { data } = await _supabase.from('pedidos').select('*').order('creado_en', { ascending: false });
        if (data) { 
            pedidosActuales = data; 
            actualizarCombos(data);
            actualizarTabla(data); 
        }
    }

    function actualizarCombos(lista) {
        const s = document.getElementById('cliente-select');
        const v = s.value;
        const u = [...new Set(lista.map(p => p.cliente))].sort();
        s.innerHTML = '<option value="">Seleccionar cliente</option><option value="NUEVO">+ Agregar nuevo</option>';
        u.forEach(c => s.innerHTML += `<option value="${c}">${c}</option>`);
        s.value = v;
    }

    function actualizarTabla(lista) {
        const tbody = document.getElementById('tabla-pedidos');
        tbody.innerHTML = '';
        let pen = 0, ent = 0;
        lista.forEach(p => {
            p.entregado ? ent++ : pen++;
            tbody.innerHTML += `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-4 font-semibold text-slate-700 whitespace-nowrap">${p.cliente}</td>
                    <td class="px-6 py-4 text-center text-slate-500">${p.producto}</td>
                    <td class="px-6 py-4 text-center font-bold text-blue-600">S/. ${(p.precio_total || 0).toFixed(2)}</td>
                    <td class="px-6 py-4 text-center">
                        <span class="px-3 py-1 rounded-full text-xs font-bold ${p.entregado ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}">
                            ${p.entregado ? 'Listo' : 'Pendiente'}
                        </span>
                    </td>
                    <td class="px-6 py-4 flex justify-center gap-3">
                        ${!p.entregado ? `<button onclick="marcarEntregado(${p.id})" class="text-emerald-500 hover:bg-emerald-50 p-2 rounded-lg transition-all">✓</button>` : ''}
                        <button onclick="eliminarPedido(${p.id})" class="text-rose-500 hover:bg-rose-50 p-2 rounded-lg transition-all">✕</button>
                    </td>
                </tr>`;
        });
        renderChart(pen, ent);
    }

    async function guardarPedido() {
        const s = document.getElementById('cliente-select');
        const i = document.getElementById('cliente-nuevo');
        let c = s.value === "NUEVO" ? i.value.trim() : s.value;
        const pr = document.getElementById('producto').value;
        const p = parseFloat(document.getElementById('precio').value);

        if (c && pr && p) {
            await _supabase.from('pedidos').insert([{ cliente: c, producto: pr, precio_total: p, entregado: false }]);
            s.value = ""; i.value = ""; i.classList.add('hidden');
            document.getElementById('producto').value = ''; document.getElementById('precio').value = '';
            cargarPedidos();
        }
    }

    async function marcarEntregado(id) { await _supabase.from('pedidos').update({ entregado: true }).eq('id', id); cargarPedidos(); }
    async function eliminarPedido(id) { if(confirm("¿Eliminar?")) { await _supabase.from('pedidos').delete().eq('id', id); cargarPedidos(); } }

    function exportarExcelReal() {
        const info = pedidosActuales.map(p => {
            const t = p.precio_total || 0;
            return {
                "CLIENTE": p.cliente, "PEDIDO": p.producto, 
                "BASE": (t/1.18).toFixed(2), "IGV": (t-(t/1.18)).toFixed(2),
                "TOTAL": t.toFixed(2), "ESTADO": p.entregado ? "Entregado" : "Pendiente"
            };
        });
        const ws = XLSX.utils.json_to_sheet(info);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Ventas");
        XLSX.writeFile(wb, "Reporte_Chavez_Tailwind.xlsx");
    }

    checkUser();
</script>
</body>
</html>
