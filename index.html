<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribuidora Chávez - Acceso Seguro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        #login-container { max-width: 400px; margin-top: 100px; }
        .header-chavez { background: #0047ab; color: white; padding: 25px 0; border-radius: 0 0 25px 25px; margin-bottom: 30px; }
        .hidden { display: none !important; }
        .card { border: none; border-radius: 15px; }
    </style>
</head>
<body>

<div id="auth-section" class="container">
    <div id="login-container" class="mx-auto card p-4 shadow">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-primary">DISTRIBUIDORA CHÁVEZ</h3>
            <p class="text-muted">Inicia sesión para continuar</p>
        </div>
        <input type="email" id="login-email" class="form-control mb-3" placeholder="Correo electrónico">
        <input type="password" id="login-password" class="form-control mb-3" placeholder="Contraseña">
        <button class="btn btn-primary w-100 fw-bold" onclick="login()">ENTRAR</button>
        <div id="login-error" class="text-danger mt-3 small text-center hidden">Datos incorrectos. Intenta de nuevo.</div>
    </div>
</div>

<div id="app-section" class="hidden">
    <div class="header-chavez text-center shadow">
        <div class="container d-flex justify-content-between align-items-center">
            <div style="width: 80px;"></div> <div>
                <h2 class="fw-bold m-0">DISTRIBUIDORA CHÁVEZ</h2>
                <p class="m-0 opacity-75">Panel de Administración</p>
            </div>
            <button class="btn btn-sm btn-outline-light" onclick="logout()">Salir</button>
        </div>
    </div>

    <div class="container pb-5">
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card p-4 shadow-sm">
                    <h5 class="fw-bold text-primary mb-3">Nuevo Registro</h5>
                    <input type="text" id="cliente" class="form-control mb-2" placeholder="Nombre del Cliente">
                    <input type="text" id="producto" class="form-control mb-2" placeholder="Producto/Cantidad">
                    <div class="input-group mb-3">
                        <span class="input-group-text">S/.</span>
                        <input type="number" id="precio" class="form-control" placeholder="Precio Total">
                    </div>
                    <button class="btn btn-primary w-100 fw-bold" onclick="guardarPedido()">GUARDAR PEDIDO</button>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="card p-4 shadow-sm">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="fw-bold m-0">Lista de Pedidos</h5>
                        <button class="btn btn-success fw-bold btn-sm" onclick="exportarExcelReal()">EXCEL</button>
                    </div>
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Cliente</th>
                                    <th>Pedido</th>
                                    <th>Total</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-pedidos"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const _supabase = supabase.createClient('https://ozdpcjhwbdsuqncgxfpz.supabase.co', 'sb_publishable_aBgdzg-JTQ61i1IkjUYysQ_4lYYJGPQ');
    let pedidosActuales = [];

    // --- LÓGICA DE SEGURIDAD ---
    async function login() {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

        if (error) {
            document.getElementById('login-error').classList.remove('hidden');
        } else {
            checkUser();
        }
    }

    async function logout() {
        await _supabase.auth.signOut();
        checkUser();
    }

    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            cargarPedidos();
        } else {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('app-section').classList.add('hidden');
        }
    }

    // --- LÓGICA DE LA APP ---
    async function cargarPedidos() {
        const { data, error } = await _supabase.from('pedidos').select('*').order('creado_en', { ascending: false });
        if (!error) { pedidosActuales = data; render(data); }
    }

    function render(lista) {
        const tbody = document.getElementById('tabla-pedidos');
        tbody.innerHTML = '';
        lista.forEach(p => {
            tbody.innerHTML += `
                <tr class="${p.entregado ? 'row-done' : ''}">
                    <td><b>${p.cliente}</b></td>
                    <td>${p.producto}</td>
                    <td>S/. ${(p.precio_total || 0).toFixed(2)}</td>
                    <td><span class="badge ${p.entregado ? 'bg-success' : 'bg-warning'}">${p.entregado ? 'Listo' : 'Pendiente'}</span></td>
                    <td>
                        <div class="btn-group">
                            ${!p.entregado ? `<button class="btn btn-sm btn-success" onclick="marcarEntregado(${p.id})">✓</button>` : ''}
                            <button class="btn btn-sm btn-danger" onclick="eliminarPedido(${p.id})">✕</button>
                        </div>
                    </td>
                </tr>`;
        });
    }

    async function guardarPedido() {
        const cliente = document.getElementById('cliente').value;
        const producto = document.getElementById('producto').value;
        const precio = parseFloat(document.getElementById('precio').value);
        if (cliente && producto && !isNaN(precio)) {
            await _supabase.from('pedidos').insert([{ cliente, producto, precio_total: precio }]);
            document.getElementById('cliente').value = '';
            document.getElementById('producto').value = '';
            document.getElementById('precio').value = '';
            cargarPedidos();
        }
    }

    async function marcarEntregado(id) {
        await _supabase.from('pedidos').update({ entregado: true }).eq('id', id);
        cargarPedidos();
    }

    async function eliminarPedido(id) {
        if(confirm("¿Eliminar este pedido?")) {
            await _supabase.from('pedidos').delete().eq('id', id);
            cargarPedidos();
        }
    }

    function exportarExcelReal() {
        const infoParaExcel = pedidosActuales.map(p => {
            const total = p.precio_total || 0;
            const base = total / 1.18;
            const igv = total - base;
            return {
                "CLIENTE": p.cliente,
                "PEDIDO": p.producto,
                "BASE IMPONIBLE": base.toFixed(2),
                "IGV (18%)": igv.toFixed(2),
                "TOTAL (S/.)": total.toFixed(2),
                "ESTADO": p.entregado ? "Entregado" : "Pendiente"
            };
        });
        const worksheet = XLSX.utils.json_to_sheet(infoParaExcel);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Pedidos");
        XLSX.writeFile(workbook, "Reporte_Distribuidora_Chavez.xlsx");
    }

    // Ejecutar al cargar la página
    checkUser();
</script>
</body>
</html>
