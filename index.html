<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribuidora Chávez | Sistema Integral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen text-left">

<div id="auth-section" class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-xl w-full max-w-md border border-slate-100 dark:border-slate-700 text-center">
        <h1 class="text-2xl font-black mb-6">DISTRIBUIDORA CHÁVEZ</h1>
        <input type="email" id="login-email" placeholder="Correo" class="w-full p-3 mb-4 rounded-xl border dark:bg-slate-700">
        <input type="password" id="login-password" placeholder="Contraseña" class="w-full p-3 mb-4 rounded-xl border dark:bg-slate-700">
        <button onclick="login()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl">ENTRAR</button>
    </div>
</div>

<div id="app-section" class="hidden max-w-7xl mx-auto p-4">
    <nav class="flex justify-between items-center bg-blue-600 p-6 rounded-3xl mb-8 text-white">
        <h2 class="font-bold text-xl">DISTRIBUIDORA CHÁVEZ</h2>
        <div class="flex gap-2">
            <button onclick="cambiarPestana('ventas')" id="btn-tab-ventas" class="px-4 py-2 bg-white text-blue-600 font-bold rounded-xl text-sm">Ventas</button>
            <button onclick="cambiarPestana('gastos')" id="btn-tab-gastos" class="px-4 py-2 bg-blue-500 font-bold rounded-xl text-sm">Gastos</button>
            <button onclick="logout()" class="px-4 py-2 bg-red-500 font-bold rounded-xl text-sm">Salir</button>
        </div>
    </nav>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl border dark:border-slate-700">
            <div id="form-ventas">
                <h3 class="font-bold mb-4">Registrar Venta</h3>
                <select id="cliente-select" onchange="toggleNuevoCliente()" class="w-full p-3 mb-3 rounded-xl border dark:bg-slate-700"><option value="">Cliente</option><option value="NUEVO">+ Nuevo</option></select>
                <input type="text" id="cliente-nuevo" placeholder="Nombre" class="hidden w-full p-3 mb-3 rounded-xl border dark:bg-slate-700">
                <input type="text" id="producto" placeholder="Producto" class="w-full p-3 mb-3 rounded-xl border dark:bg-slate-700">
                <input type="number" id="precio" placeholder="S/." class="w-full p-3 mb-3 rounded-xl border dark:bg-slate-700">
                <button onclick="guardarPedido()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">GUARDAR</button>
            </div>
            <div id="form-gastos" class="hidden">
                <h3 class="font-bold mb-4 text-rose-500">Registrar Gasto</h3>
                <input type="text" id="gasto-desc" placeholder="Descripción" class="w-full p-3 mb-3 rounded-xl border dark:bg-slate-700">
                <input type="number" id="gasto-monto" placeholder="Monto S/." class="w-full p-3 mb-3 rounded-xl border dark:bg-slate-700">
                <button onclick="guardarGasto()" class="w-full bg-rose-500 text-white py-3 rounded-xl font-bold">GUARDAR</button>
            </div>
        </div>

        <div class="lg:col-span-2 bg-white dark:bg-slate-800 p-6 rounded-3xl border dark:border-slate-700">
            <table class="w-full text-sm">
                <thead><tr id="header-tabla" class="text-slate-400 border-b dark:border-slate-700"></tr></thead>
                <tbody id="body-tabla"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="hidden"><div id="ticket-template" style="width:300px; padding:30px; font-family:sans-serif; color:#000; background:#fff;"><h2 style="text-align:center;">DISTRIBUIDORA CHÁVEZ</h2><div style="margin:20px 0;"><p><strong>Cliente:</strong> <span id="ticket-cliente"></span></p><p><strong>Prod:</strong> <span id="ticket-producto"></span></p><p style="font-size:18px; font-weight:900;">TOTAL: S/. <span id="ticket-total"></span></p></div></div></div>

<script>
    const _supabase = supabase.createClient('https://ozdpcjhwbdsuqncgxfpz.supabase.co', 'sb_publishable_aBgdzg-JTQ61i1IkjUYysQ_4lYYJGPQ');
    
    // Función central de actualización con iconos SVG reales
    async function actualizarInterfaz(){
        const isV = !document.getElementById('form-ventas').classList.contains('hidden');
        const h = document.getElementById('header-tabla'), b = document.getElementById('body-tabla');
        b.innerHTML='';
        
        if(isV){
            h.innerHTML='<th>Cliente</th><th>Total</th><th>Acciones</th>';
            pedidosActuales.forEach(i=>{
                b.innerHTML+=`<tr>
                    <td class="p-4">${i.cliente}<br><small class="text-slate-400">${i.producto}</small></td>
                    <td class="p-4 font-bold">S/. ${i.precio_total}</td>
                    <td class="p-4 flex gap-3">
                        <button onclick="ws('${i.cliente}','${i.producto}',${i.precio_total})" class="text-emerald-500"><svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a5.47 5.47 0 0 1-2.793-.766l-.201-.12-2.083.546 5.564-1.792Z"/></svg></button>
                        <button onclick="generarRecibo('${i.cliente}','${i.producto}',${i.precio_total},'${new Date(i.creado_en).toLocaleDateString()}')" class="text-blue-500"><svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg></button>
                        <button onclick="eliminarPedido(${i.id})" class="text-red-500 font-bold">✕</button>
                    </td>
                </tr>`;
            });
        } else {
            h.innerHTML='<th>Descripción</th><th>Monto</th><th>Acción</th>';
            gastosActuales.forEach(i=>{
                b.innerHTML+=<tr><td class="p-4 font-bold">${i.descripcion}</td><td class="p-4 font-bold text-rose-500">S/. ${i.monto}</td><td class="p-4"><button onclick="eliminarGasto(${i.id})" class="text-red-500 font-bold">✕</button></td></tr>;
            });
        }
    }

    // Funciones esenciales para que todo funcione
    async function checkUser(){ const {data:{user}} = await _supabase.auth.getUser(); if(user){ document.getElementById('auth-section').classList.add('hidden'); document.getElementById('app-section').classList.remove('hidden'); cambiarPestana('ventas'); cargarTodo(); } }
    async function login(){ const e=document.getElementById('login-email').value, p=document.getElementById('login-password').value; const {error} = await _supabase.auth.signInWithPassword({email:e, password:p}); if(!error) location.reload(); else alert("Error de acceso"); }
    async function logout(){ await _supabase.auth.signOut(); location.reload(); }
    function ws(c,pr,t){ window.open(https://api.whatsapp.com/send?text=${encodeURIComponent('Hola '+c+'! Pedido: '+pr+' por S/. '+t.toFixed(2))}); }
    function generarRecibo(c,pr,t,f){ document.getElementById('ticket-fecha').textContent=f; document.getElementById('ticket-cliente').textContent=c; document.getElementById('ticket-producto').textContent=pr; document.getElementById('ticket-total').textContent=t.toFixed(2); html2pdf().from(document.getElementById('ticket-template')).save(); }
    async function cargarTodo(){ const {data:p} = await _supabase.from('pedidos').select('').order('creado_en',{ascending:false}); const {data:g} = await _supabase.from('gastos').select('').order('creado_en',{ascending:false}); pedidosActuales=p||[]; gastosActuales=g||[]; actualizarInterfaz(); }
    function cambiarPestana(t){ const isV=t==='ventas'; document.getElementById('form-ventas').classList.toggle('hidden',!isV); document.getElementById('form-gastos').classList.toggle('hidden',isV); actualizarInterfaz(); }
    function toggleNuevoCliente(){ const s=document.getElementById('cliente-select'), i=document.getElementById('cliente-nuevo'); s.value==="NUEVO"?i.classList.remove('hidden'):i.classList.add('hidden'); }
    async function guardarPedido(){ const s=document.getElementById('cliente-select'), c=s.value==="NUEVO"?document.getElementById('cliente-nuevo').value:s.value; const pr=document.getElementById('producto').value, p=parseFloat(document.getElementById('precio').value); if(c && pr && p){ await _supabase.from('pedidos').insert([{cliente:c, producto:pr, precio_total:p}]); cargarTodo(); } }
    async function guardarGasto(){ const d=document.getElementById('gasto-desc').value, m=parseFloat(document.getElementById('gasto-monto').value); if(d && m){ await _supabase.from('gastos').insert([{descripcion:d, monto:m}]); cargarTodo(); } }
    async function eliminarPedido(id){ if(confirm("¿Eliminar?")) { await _supabase.from('pedidos').delete().eq('id',id); cargarTodo(); } }
    async function eliminarGasto(id){ if(confirm("¿Eliminar?")) { await _supabase.from('gastos').delete().eq('id',id); cargarTodo(); } }

    document.addEventListener('DOMContentLoaded', checkUser);
</script>
</body>
</html>
