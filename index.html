<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d6efd">
    <link rel="manifest" href="./manifest.json">
    <title>Distribuidora Chávez | Sistema Integral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="./excel-export.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen text-left">

<div id="auth-section" class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-md border border-slate-100 dark:border-slate-700 text-center">
        <div class="bg-blue-600 w-16 h-16 rounded-2xl mx-auto flex items-center justify-center mb-6 shadow-lg">
            <span class="text-white text-3xl font-bold">D</span>
        </div>
        <h1 class="text-2xl font-black dark:text-white mb-8 tracking-tighter uppercase">Distribuidora Chávez</h1>
        <div class="space-y-4">
            <input type="email" id="login-email" placeholder="Correo" class="w-full px-4 py-3 rounded-xl border dark:border-slate-600 dark:bg-slate-700 dark:text-white outline-none focus:ring-2 focus:ring-blue-500">
            <input type="password" id="login-password" placeholder="Contraseña" class="w-full px-4 py-3 rounded-xl border dark:border-slate-600 dark:bg-slate-700 dark:text-white outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all">ENTRAR</button>
        </div>
    </div>
</div>

<div id="app-section" class="hidden">
    <nav class="bg-blue-600 dark:bg-blue-900 text-white shadow-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <h2 class="text-xl font-bold uppercase tracking-tight">Distribuidora Chávez</h2>
            <div class="flex items-center gap-3">
                <button onclick="toggleDarkMode()" class="p-2.5 bg-white/10 hover:bg-white/20 rounded-xl transition-all" title="Modo Noche">
                    <span id="theme-icon">🌙</span>
                </button>
                <div class="flex bg-blue-800/40 rounded-xl p-1">
                    <button onclick="cambiarPestana('ventas')" id="btn-tab-ventas" class="px-5 py-2 rounded-lg text-xs font-bold transition-all bg-white text-blue-700 shadow-sm">Ventas</button>
                    <button onclick="cambiarPestana('gastos')" id="btn-tab-gastos" class="px-5 py-2 rounded-lg text-xs font-bold transition-all text-white opacity-60">Gastos</button>
                </div>
                <button onclick="logout()" class="p-2.5 bg-white/10 hover:bg-rose-500 rounded-xl transition-all" title="Cerrar Sesión">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
            <h3 class="text-lg font-bold dark:text-white uppercase tracking-tight text-slate-800">Panel Financiero</h3>
            <select id="filtro-fecha" onchange="aplicarFiltros()" class="w-full sm:w-auto p-3 bg-white dark:bg-slate-800 dark:text-white rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 outline-none focus:ring-2 focus:ring-blue-500 font-bold text-sm text-slate-600 cursor-pointer transition-all hover:bg-slate-50 dark:hover:bg-slate-700">
                <option value="todos">🕒 Todo el Historial</option>
                <option value="hoy">📅 Solo Ventas de Hoy</option>
                <option value="mes">📊 Balance de este Mes</option>
                <option value="semana1">📈 Últimas 1 Semana</option>
                <option value="semana2">📈 Últimas 2 Semanas</option>
                <option value="semana4">📈 Últimas 4 Semanas</option>
            </select>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">

            <div class="bg-white dark:bg-slate-800 p-7 rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-700 border-l-4 border-l-blue-500">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Ventas</p>
                <h4 class="text-2xl font-bold text-slate-800 dark:text-white" id="resumen-ventas">S/. 0.00</h4>
            </div>
            <div class="bg-white dark:bg-slate-800 p-7 rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-700 border-l-4 border-l-rose-500">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Gastos</p>
                <h4 class="text-2xl font-bold text-slate-800 dark:text-white" id="resumen-gastos">S/. 0.00</h4>
            </div>
            <div class="bg-white dark:bg-slate-800 p-7 rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-700 border-l-4 border-l-emerald-500">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Utilidad Neta</p>
                <h4 class="text-2xl font-bold text-slate-800 dark:text-white" id="resumen-utilidad">S/. 0.00</h4>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 text-left">
            <div class="lg:col-span-4 space-y-8">
                <div class="bg-white dark:bg-slate-800 p-7 rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-700">
                    <div id="form-ventas">
                        <h3 class="font-bold mb-6 flex items-center gap-2 dark:text-white text-md tracking-tight"><div class="w-1.5 h-5 bg-blue-600 rounded-full"></div> Registrar Venta</h3>
                        <div class="space-y-4">
                            <select id="cliente-select" onchange="toggleNuevoCliente()" class="w-full p-4 bg-[#f8fafc] dark:bg-slate-700 dark:text-white rounded-2xl outline-none border border-slate-100 dark:border-slate-600 focus:ring-2 focus:ring-blue-500 text-sm">
                                <option value="">Seleccionar cliente</option><option value="NUEVO">+ Cliente Nuevo</option>
                            </select>
                            <input type="text" id="cliente-nuevo" placeholder="Nombre completo" class="hidden w-full p-4 bg-white dark:bg-slate-700 dark:text-white border-2 border-blue-50 dark:border-slate-600 rounded-2xl outline-none text-sm">
                            <input type="text" id="producto" placeholder="Producto (ej. Bidón 20L)" class="w-full p-4 bg-[#f8fafc] dark:bg-slate-700 dark:text-white rounded-2xl border border-slate-100 dark:border-slate-600 text-sm">
                            <input type="number" id="precio" placeholder="Precio Total S/." class="w-full p-4 bg-[#f8fafc] dark:bg-slate-700 dark:text-white rounded-2xl border border-slate-100 dark:border-slate-600 text-sm">
                            <button onclick="guardarPedido()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">Guardar Pedido</button>
                        </div>
                    </div>
                    <div id="form-gastos" class="hidden">
                        <h3 class="font-bold mb-6 flex items-center gap-2 text-rose-500 text-md tracking-tight"><div class="w-1.5 h-5 bg-rose-500 rounded-full"></div> Registrar Gasto</h3>
                        <div class="space-y-4">
                            <input type="text" id="gasto-desc" placeholder="Descripción del gasto" class="w-full p-4 bg-[#f8fafc] dark:bg-slate-700 dark:text-white rounded-2xl border border-slate-100 dark:border-slate-600 text-sm">
                            <input type="number" id="gasto-monto" placeholder="Monto S/." class="w-full p-4 bg-[#f8fafc] dark:bg-slate-700 dark:text-white rounded-2xl border border-slate-100 dark:border-slate-600 text-sm">
                            <button onclick="guardarGasto()" class="w-full bg-rose-500 hover:bg-rose-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">Guardar Gasto</button>
                        </div>
                    </div>
                </div>
                <div class="bg-white dark:bg-slate-800 p-6 rounded-[2rem] flex flex-col items-center justify-center border border-slate-100 dark:border-slate-700 shadow-sm">
                    <div class="w-full">
                        <div class="flex items-center justify-between mb-3">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Distribución Pedidos</p>
                        </div>
                        <div class="h-56">
                            <canvas id="graficoEntregas"></canvas>
                        </div>
                    </div>
                </div>

            </div>

            <div class="lg:col-span-8">
                <div class="bg-white dark:bg-slate-800 rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-700 overflow-hidden">
                    <div class="p-7 border-b dark:border-slate-700 flex flex-col md:flex-row justify-between items-center gap-4 bg-white dark:bg-slate-800">
                        <h3 class="font-bold dark:text-white text-lg" id="titulo-seccion">Registros</h3>
                        <div class="flex gap-2 w-full md:w-auto">
                            <div class="relative w-full">
                                <input type="text" id="buscador" onkeyup="filtrarPedidos()" placeholder="Buscar cliente..." class="w-full pl-5 pr-4 py-3 bg-[#f8fafc] dark:bg-slate-700 dark:text-white rounded-2xl text-sm outline-none border border-slate-100 dark:border-slate-600 focus:ring-2 focus:ring-blue-500">
                            </div>
                            <button onclick="exportarExcelReal()" id="btn-excel" class="bg-[#10b981] hover:bg-emerald-600 text-white px-5 rounded-2xl font-bold text-xs shadow-md transition-all">EXCEL</button>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead class="bg-slate-50 dark:bg-slate-700/50 text-slate-400 font-bold uppercase text-[10px] tracking-widest">
                                <tr id="header-tabla"></tr>
                            </thead>
                            <tbody id="body-tabla" class="divide-y divide-slate-50 dark:divide-slate-700"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const _supabase = supabase.createClient('https://ozdpcjhwbdsuqncgxfpz.supabase.co', 'sb_publishable_aBgdzg-JTQ61i1IkjUYysQ_4lYYJGPQ');
    
    // Arrays Globales: DB original vs Actual (Filtrado)
    let pedidosDB = [], gastosDB = [];
    let pedidosActuales = [], gastosActuales = [];
    let chartObj = null;

    async function login() {
        const e = document.getElementById('login-email').value, p = document.getElementById('login-password').value;
        const { error } = await _supabase.auth.signInWithPassword({ email: e, password: p });
        if (!error) checkUser(); else alert("Error de acceso: Credenciales incorrectas");
    }
    
    async function logout() { await _supabase.auth.signOut(); location.reload(); }
    
    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            cambiarPestana('ventas'); cargarTodo();
        }
    }

    // 1. CARGA TODO DESDE SUPABASE UNA SOLA VEZ
    async function cargarTodo() {
        const { data: p } = await _supabase.from('pedidos').select('*').order('creado_en', { ascending: false });
        const { data: g } = await _supabase.from('gastos').select('*').order('creado_en', { ascending: false });
        pedidosDB = p || []; gastosDB = g || [];
        
        // Carga los combos de clientes únicos globalmente
        const s = document.getElementById('cliente-select');
        const vS = s.value;
        const u = [...new Set(pedidosDB.map(ped => ped.cliente))].sort();
        s.innerHTML = '<option value="">Seleccionar cliente</option><option value="NUEVO">+ Cliente Nuevo</option>';
        u.forEach(c => s.innerHTML += `<option value="${c}">${c}</option>`); s.value = vS;

        aplicarFiltros(); // Aplica el filtro de fecha actual
    }

    // 2. FILTRA POR FECHA SIN VOLVER A CONSULTAR A LA BASE DE DATOS
    function aplicarFiltros() {
        const filtro = document.getElementById('filtro-fecha').value;
        const hoy = new Date();
        
        const filtrarPorFecha = (arr) => {
            if (filtro === 'todos') return arr;
            return arr.filter(item => {
                const fechaItem = new Date(item.creado_en);
                if (filtro === 'hoy') {
                    return fechaItem.getDate() === hoy.getDate() && 
                           fechaItem.getMonth() === hoy.getMonth() && 
                           fechaItem.getFullYear() === hoy.getFullYear();
                } else if (filtro === 'mes') {
                    return fechaItem.getMonth() === hoy.getMonth() && 
                           fechaItem.getFullYear() === hoy.getFullYear();
                } else if (filtro === 'semana1') {
                    const hace1Sem = new Date(hoy);
                    hace1Sem.setDate(hace1Sem.getDate() - 7);
                    return fechaItem >= hace1Sem && fechaItem <= hoy;
                } else if (filtro === 'semana2') {
                    const hace2Sem = new Date(hoy);
                    hace2Sem.setDate(hace2Sem.getDate() - 14);
                    return fechaItem >= hace2Sem && fechaItem <= hoy;
                } else if (filtro === 'semana4') {
                    const hace4Sem = new Date(hoy);
                    hace4Sem.setDate(hace4Sem.getDate() - 28);
                    return fechaItem >= hace4Sem && fechaItem <= hoy;
                }
                return true;
            });
        };

        pedidosActuales = filtrarPorFecha(pedidosDB);
        gastosActuales = filtrarPorFecha(gastosDB);
        actualizarInterfaz();
    }

    function cambiarPestana(t) {
        const isV = t === 'ventas';
        document.getElementById('form-ventas').classList.toggle('hidden', !isV);
        document.getElementById('form-gastos').classList.toggle('hidden', isV);
        
        document.getElementById('titulo-seccion').textContent = isV ? "Historial de Ventas" : "Registro de Gastos";
        document.getElementById('buscador').placeholder = isV ? "Buscar cliente..." : "Buscar gasto...";
        document.getElementById('btn-excel').classList.toggle('hidden', !isV);
        
        document.getElementById('btn-tab-ventas').className = isV ? "px-5 py-2 rounded-lg text-xs font-bold bg-white text-blue-700 shadow-sm transition-all" : "px-5 py-2 rounded-lg text-xs font-bold text-white opacity-70";
        document.getElementById('btn-tab-gastos').className = !isV ? "px-5 py-2 rounded-lg text-xs font-bold bg-white text-rose-600 shadow-sm transition-all" : "px-5 py-2 rounded-lg text-xs font-bold text-white opacity-70";
        
        actualizarInterfaz();
    }

    function actualizarInterfaz() {
        const isV = !document.getElementById('form-ventas').classList.contains('hidden');
        const h = document.getElementById('header-tabla'), b = document.getElementById('body-tabla');
        b.innerHTML = ''; let tV = 0, tG = 0, pen = 0, ent = 0;
        const query = document.getElementById('buscador').value.toLowerCase();
        
        // Calcular Resumen
        pedidosActuales.forEach(p => { tV += p.precio_total; p.entregado ? ent++ : pen++; });
        gastosActuales.forEach(g => tG += g.monto);
        
        document.getElementById('resumen-ventas').textContent = `S/. ${tV.toFixed(2)}`;
        document.getElementById('resumen-gastos').textContent = `S/. ${tG.toFixed(2)}`;
        document.getElementById('resumen-utilidad').textContent = `S/. ${(tV - tG).toFixed(2)}`;

        // Dibujar Tablas
        if (isV) {
            h.innerHTML = '<th class="px-7 py-5 text-left">Cliente</th><th class="px-7 py-5 text-center">Total</th><th class="px-7 py-5 text-center">Estado</th><th class="px-7 py-5 text-center">Acciones</th>';
            const filtrados = pedidosActuales.filter(p => p.cliente.toLowerCase().includes(query));
            
            filtrados.forEach(p => {
                const fStr = new Date(p.creado_en).toLocaleDateString('es-PE', { day:'numeric', month:'short' });
                b.innerHTML += `
                <tr class="hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-all text-left">
                    <td class="px-7 py-5 font-bold dark:text-white">${p.cliente}<br><span class="text-[10px] text-slate-400 font-normal uppercase">${p.producto} • ${fStr}</span></td>
                    <td class="px-7 py-5 text-center font-black text-blue-600 dark:text-blue-400">S/. ${p.precio_total.toFixed(2)}</td>
                    <td class="px-7 py-5 text-center"><span class="px-2.5 py-1 rounded-lg text-[10px] font-black ${p.entregado ? 'bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400' : 'bg-amber-50 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400'}">${p.entregado ? 'LISTO' : 'PENDIENTE'}</span></td>
                    <td class="px-7 py-5 flex justify-center items-center gap-3">
                        <button onclick="enviarWhatsApp('${p.cliente}','${p.producto}',${p.precio_total})" class="text-emerald-500 hover:scale-125 transition-transform" title="WhatsApp">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766 0-3.18-2.587-5.771-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793 0-.853.448-1.273.607-1.446.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.101-.177.211-.077.383.101.173.448.738.961 1.193.661.587 1.216.768 1.39.853.173.087.275.072.376-.044.101-.116.434-.506.549-.68.116-.173.231-.144.39-.087s1.011.477 1.184.564c.173.087.289.13.332.202.045.072.045.419-.1.824z"/></svg>
                        </button>
                        <button onclick="generarReciboPDF(${p.id})" class="text-slate-800 dark:text-slate-100 hover:scale-125 transition-transform text-lg" title="Recibo">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M7 3v4h4" />
                                <path d="M7 13h10" />
                                <path d="M7 17h7" />
                                <path d="M7 7h10" />
                                <path d="M5 21h14a2 2 0 0 0 2-2V8l-6-5H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2z" />
                            </svg>
                        </button>
                        ${!p.entregado ? `<button onclick="marcarEntregado(${p.id})" class="text-blue-500 font-black hover:scale-125 transition-transform text-lg" title="Listo">✓</button>` : ''}
                        <button onclick="eliminarPedido(${p.id})" class="text-rose-500 hover:scale-125 transition-transform text-lg" title="Eliminar">✕</button>

                    </td>
                </tr>`;
            });
        } else {
            h.innerHTML = '<th class="px-7 py-5 text-left">Gasto</th><th class="px-7 py-5 text-center">Monto</th><th class="px-7 py-5 text-center">Acción</th>';
            const filtradosG = gastosActuales.filter(g => g.descripcion.toLowerCase().includes(query));
            
            filtradosG.forEach(g => {
                const fStr = new Date(g.creado_en).toLocaleDateString('es-PE', { day:'numeric', month:'short' });
                b.innerHTML += `
                <tr class="hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-all text-left">
                    <td class="px-7 py-5 font-bold dark:text-white">${g.descripcion}<br><span class="text-[10px] text-slate-400 font-normal uppercase">${fStr}</span></td>
                    <td class="px-7 py-5 text-center font-black text-rose-500">S/. ${g.monto.toFixed(2)}</td>
                    <td class="px-7 py-5 text-center"><button onclick="eliminarGasto(${g.id})" class="text-rose-500 font-bold hover:scale-125 transition-transform text-lg">✕</button></td>
                </tr>`;
            });
        }
        
        renderChart(pen, ent);
    }

    function toggleDarkMode() {

        document.documentElement.classList.toggle('dark');
        const isD = document.documentElement.classList.contains('dark');
        localStorage.setItem('theme', isD ? 'dark' : 'light');
        document.getElementById('theme-icon').textContent = isD ? '☀️' : '🌙';
        actualizarInterfaz();
    }

    function enviarWhatsApp(c, pr, t) {
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent('¡Hola ' + c + '! 👋 Confirmamos tu pedido de ' + pr + ' por S/. ' + t.toFixed(2) + '. ¡Gracias! 🚛💧')}`, '_blank');
    }

    function renderChart(p, e) {
        const ctx = document.getElementById('graficoEntregas').getContext('2d');

        if (chartObj) chartObj.destroy();

        const isDark = document.documentElement.classList.contains('dark');
        chartObj = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: ['Pendientes', 'Listos'], datasets: [{ data: [p, e], backgroundColor: ['#f97316', '#10b981'], borderWidth: 0 }] },
            options: { maintainAspectRatio: false, cutout: '83%', plugins: { legend: { display: true, position: 'bottom', labels: { usePointStyle: true, font: { size: 10, weight: 'bold' }, color: isDark ? '#cbd5e1' : '#64748b', padding: 12 } } } }
        });
    }

    async function guardarPedido() {
        const s = document.getElementById('cliente-select'), c = s.value === "NUEVO" ? document.getElementById('cliente-nuevo').value : s.value;
        const pr = document.getElementById('producto').value, p = parseFloat(document.getElementById('precio').value);
        if (c && pr && p) {
            await _supabase.from('pedidos').insert([{ cliente: c, producto: pr, precio_total: p, entregado: false }]);
            s.value = ""; document.getElementById('cliente-nuevo').value = ""; document.getElementById('cliente-nuevo').classList.add('hidden');
            document.getElementById('producto').value = ''; document.getElementById('precio').value = '';
            cargarTodo();
        }
    }

    async function guardarGasto() {
        const d = document.getElementById('gasto-desc').value, m = parseFloat(document.getElementById('gasto-monto').value);
        if (d && m) {
            await _supabase.from('gastos').insert([{ descripcion: d, monto: m }]);
            document.getElementById('gasto-desc').value = ''; document.getElementById('gasto-monto').value = '';
            cargarTodo();
        }
    }

    async function marcarEntregado(id) { await _supabase.from('pedidos').update({ entregado: true }).eq('id', id); cargarTodo(); }
    async function eliminarPedido(id) { if(confirm("¿Eliminar este pedido?")) { await _supabase.from('pedidos').delete().eq('id', id); cargarTodo(); } }
    async function eliminarGasto(id) { if(confirm("¿Eliminar este gasto?")) { await _supabase.from('gastos').delete().eq('id', id); cargarTodo(); } }
    
    function toggleNuevoCliente() {
        const s = document.getElementById('cliente-select'), i = document.getElementById('cliente-nuevo');
        s.value === "NUEVO" ? i.classList.remove('hidden') : i.classList.add('hidden');
    }
    
    function filtrarPedidos() { actualizarInterfaz(); }

    function calcIGV(subtotal) {
        const IGV = 0.18; // 18%
        const s = Number(subtotal);
        return Number.isFinite(s) ? (s * IGV) : 0;
    }

    // Asumimos que precio_total guarda el TOTAL CON IGV.
    function totalToSubtotalIGV(totalConIGV) {
        const total = Number(totalConIGV);
        if (!Number.isFinite(total)) return { subtotal: 0, igv: 0 };
        const subtotal = total / 1.18;
        const igv = total - subtotal;
        return { subtotal, igv };
    }

    function exportarExcelReal() {
        const info = pedidosActuales.map(p => {
            const total = Number(p.precio_total) || 0;
            const { subtotal, igv } = totalToSubtotalIGV(total);
            return {
                "FECHA": new Date(p.creado_en).toLocaleDateString('es-PE'),
                "CLIENTE": p.cliente,
                "PRODUCTO": p.producto,
                "SUBTOTAL": subtotal.toFixed(2),
                "IGV": igv.toFixed(2),
                "TOTAL": total.toFixed(2),
                "ESTADO": p.entregado ? "Listo" : "Pendiente"
            };
        });
        exportToExcelAutoWidth(info, 'Ventas', 'Reporte_Distribuidora_Chavez');
    }


        function generarReciboPDF(idPedido) {
                const pedido = pedidosDB.find(p => String(p.id) === String(idPedido));
                if (!Number.isFinite(idPedido)) idPedido = Number(idPedido);

                if (!pedido) {
                        alert('No se encontró el pedido');
                        return;
                }

                const total = Number(pedido.precio_total) || 0;
                const { subtotal, igv } = totalToSubtotalIGV(total);
                const fecha = new Date(pedido.creado_en).toLocaleDateString('es-PE', { year: 'numeric', month: '2-digit', day: '2-digit' });
                const estado = pedido.entregado ? 'LISTO' : 'PENDIENTE';
                const empresa = 'Distribuidora Chávez';

                const jsPDFConstructor = window.jspdf?.jsPDF || window.jsPDF;
                if (!jsPDFConstructor) {
                        alert('No se pudo generar el recibo: jsPDF no está disponible.');
                        return;
                }

                try {
                        const doc = new jsPDFConstructor({ orientation: 'portrait', unit: 'mm', format: 'a4' });
                        const pageWidth = doc.internal.pageSize.getWidth();
                        const margin = 15;
                        let y = 20;

                        doc.setFont('helvetica', 'bold');
                        doc.setFontSize(18);
                        doc.setTextColor('#0d6efd');
                        doc.text(empresa, margin, y);

                        y += 10;
                        doc.setFontSize(11);
                        doc.setFont('helvetica', 'normal');
                        doc.setTextColor('#111111');
                        doc.text('Recibo de Venta', margin, y);
                        y += 10;
                        doc.setFontSize(10);
                        doc.text(`Recibo: #${idPedido}`, margin, y);
                        doc.text(`Fecha: ${fecha}`, pageWidth - margin, y, { align: 'right' });

                        y += 10;
                        doc.setDrawColor(13, 110, 253);
                        doc.setLineWidth(0.6);
                        doc.line(margin, y, pageWidth - margin, y);

                        y += 12;
                        doc.setFontSize(11);
                        const clienteLines = doc.splitTextToSize(`Cliente: ${pedido.cliente}`, pageWidth - margin * 2);
                        doc.text(clienteLines, margin, y);
                        y += clienteLines.length * 6;

                        const productoLines = doc.splitTextToSize(`Producto: ${pedido.producto}`, pageWidth - margin * 2);
                        doc.text(productoLines, margin, y);
                        y += productoLines.length * 6;

                        doc.text(`Estado: ${estado}`, margin, y);

                        y += 12;
                        doc.setDrawColor(200, 200, 200);
                        doc.setLineWidth(0.4);
                        doc.line(margin, y, pageWidth - margin, y);

                        y += 10;
                        doc.setFont('helvetica', 'bold');
                        doc.text('Detalle de Pago', margin, y);
                        y += 8;
                        doc.setFont('helvetica', 'normal');

                        const details = [
                                ['Subtotal', `S/. ${subtotal.toFixed(2)}`],
                                ['IGV (18%)', `S/. ${igv.toFixed(2)}`],
                                ['Total', `S/. ${total.toFixed(2)}`]
                        ];

                        details.forEach(([label, value]) => {
                                doc.text(label, margin, y);
                                doc.text(value, pageWidth - margin, y, { align: 'right' });
                                y += 8;
                        });

                        y += 12;
                        doc.setDrawColor(13, 110, 253);
                        doc.setLineWidth(0.6);
                        doc.line(margin, y, pageWidth - margin, y);

                        y += 10;
                        doc.setFontSize(10);
                        doc.setTextColor('#666666');
                        const footerLines = doc.splitTextToSize('Gracias por tu compra • Distribuidora Chávez', pageWidth - margin * 2);
                        doc.text(footerLines, margin, y);

                        // Manejo de descarga: usar save() por defecto, pero iOS/Safari a veces no descarga correctamente.
                        const fileName = `Recibo_${empresa.replace(/\s+/g, '_')}_#${idPedido}.pdf`;
                        const isIOS = /iP(hone|od|ad)/i.test(navigator.userAgent);

                        if (isIOS) {
                            // Para iOS, abrir en nueva ventana usando data URL dentro de un iframe
                            const pdfData = doc.output('datauristring');
                            const newWin = window.open('');
                            if (newWin) {
                                newWin.document.open();
                                newWin.document.write("<html><head><title>" + fileName + "</title></head><body style='margin:0'>");
                                newWin.document.write("<iframe width='100%' height='100%' src='" + pdfData + "'></iframe>");
                                newWin.document.write("</body></html>");
                                newWin.document.close();
                            } else {
                                // Si no se puede abrir ventana, intentar crear blob y navegar a URL
                                try {
                                    const blob = doc.output('blob');
                                    const url = URL.createObjectURL(blob);
                                    window.location.href = url;
                                } catch (e) {
                                    console.warn('No se pudo abrir PDF en iOS:', e);
                                    doc.save(fileName);
                                }
                            }
                        } else {
                            // Navegadores de escritorio y Android: descarga directa
                            doc.save(fileName);
                        }
                } catch (err) {
                        console.error('Error generando PDF con jsPDF:', err);
                        alert('No se pudo generar el recibo. Intenta de nuevo o usa otro navegador.');
                }
        }

    document.addEventListener('DOMContentLoaded', checkUser);

    // Desregistrar cualquier Service Worker anterior para evitar carga de app cacheada.
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
            registrations.forEach(reg => {
                reg.unregister().then(success => {
                    if (success) console.log('Service Worker desregistrado:', reg.scope);
                });
            });
        }).catch(err => console.warn('No se pudieron obtener los service workers:', err));
    }
