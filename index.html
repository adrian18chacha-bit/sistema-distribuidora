<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribuidora Chávez PRO v5</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        #login-container { max-width: 400px; margin-top: 100px; }
        .header-chavez { background: #0047ab; color: white; padding: 25px 0; border-radius: 0 0 25px 25px; margin-bottom: 30px; }
        .hidden { display: none !important; }
        .card { border: none; border-radius: 15px; }
        .table td { white-space: nowrap !important; padding: 12px !important; }
        .btn-actions { display: flex; gap: 15px; justify-content: center; }
        .form-select, .form-control { border-radius: 8px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="auth-section" class="container">
    <div id="login-container" class="mx-auto card p-4 shadow text-center">
        <h3 class="fw-bold text-primary">DISTRIBUIDORA CHÁVEZ</h3>
        <p class="text-muted">Acceso Administrativo</p>
        <input type="email" id="login-email" class="form-control mb-3" placeholder="Correo">
        <input type="password" id="login-password" class="form-control mb-3" placeholder="Contraseña">
        <button class="btn btn-primary w-100 fw-bold" onclick="login()">ENTRAR</button>
    </div>
</div>

<div id="app-section" class="hidden">
    <div class="header-chavez text-center shadow">
        <div class="container d-flex justify-content-between align-items-center">
            <div style="width: 80px;"></div>
            <h2 class="fw-bold m-0 text-white">DISTRIBUIDORA CHÁVEZ</h2>
            <button class="btn btn-sm btn-outline-light" onclick="logout()">Salir</button>
        </div>
    </div>

    <div class="container-fluid px-4 pb-5">
        <div class="row g-4">
            <div class="col-xl-3 col-lg-4">
                <div class="card p-4 shadow-sm mb-4">
                    <h5 class="fw-bold text-primary mb-3">Nuevo Registro</h5>
                    
                    <label class="small fw-bold text-muted">Nombre del Cliente:</label>
                    <select id="cliente-select" class="form-select" onchange="toggleNuevoCliente()">
                        <option value="">-- Seleccionar cliente --</option>
                        <option value="NUEVO">+ Agregar nuevo cliente</option>
                    </select>
                    
                    <input type="text" id="cliente-nuevo" class="form-control hidden" placeholder="Escribe nombre nuevo">
                    
                    <label class="small fw-bold text-muted">Producto:</label>
                    <input type="text" id="producto" class="form-control" placeholder="Ej: Bidón 20L">
                    
                    <label class="small fw-bold text-muted">Precio Total:</label>
                    <input type="number" id="precio" class="form-control" placeholder="S/. 0.00">
                    
                    <button class="btn btn-primary w-100 fw-bold mt-2" onclick="guardarPedido()">GUARDAR PEDIDO</button>
                </div>
                <div class="card p-4 shadow-sm text-center">
                    <h5 class="fw-bold mb-3 small text-muted">Estado de Entregas</h5>
                    <div style="height: 220px;"><canvas id="graficoEntregas"></canvas></div>
                </div>
            </div>

            <div class="col-xl-9 col-lg-8">
                <div class="card p-4 shadow-sm">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="fw-bold m-0">Registro de Ventas</h5>
                        <button class="btn btn-success fw-bold btn-sm shadow" onclick="exportarExcelReal()">DESCARGAR EXCEL</button>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th style="text-align: left; min-width: 250px;">Cliente</th>
                                    <th style="text-align: center;">Pedido</th>
                                    <th style="text-align: center;">Total</th>
                                    <th style="text-align: center;">Estado</th>
                                    <th style="text-align: center;">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-pedidos"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // Configuración de Supabase
    const _supabase = supabase.createClient('https://ozdpcjhwbdsuqncgxfpz.supabase.co', 'sb_publishable_aBgdzg-JTQ61i1IkjUYysQ_4lYYJGPQ');
    let pedidosActuales = [];
    let chartObj = null;

    // Inicialización del Gráfico
    function renderChart(p, e) {
        const ctx = document.getElementById('graficoEntregas').getContext('2d');
        if (chartObj) chartObj.destroy();
        chartObj = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: ['Pendiente', 'Listo'], datasets: [{ data: [p, e], backgroundColor: ['#ffc107', '#28a745'], borderWidth: 0 }] },
            options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
        });
    }

    // Lógica del Combo Box
    function toggleNuevoCliente() {
        const select = document.getElementById('cliente-select');
        const inputNuevo = document.getElementById('cliente-nuevo');
        if (select.value === "NUEVO") {
            inputNuevo.classList.remove('hidden');
            inputNuevo.focus();
        } else {
            inputNuevo.classList.add('hidden');
            inputNuevo.value = "";
        }
    }

    // Autenticación
    async function login() {
        const e = document.getElementById('login-email').value;
        const p = document.getElementById('login-password').value;
        const { error } = await _supabase.auth.signInWithPassword({ email: e, password: p });
        if (!error) checkUser(); else alert("Acceso denegado. Revisa tus credenciales.");
    }

    async function logout() { await _supabase.auth.signOut(); location.reload(); }

    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            cargarPedidos();
        }
    }

    // Gestión de Datos
    async function cargarPedidos() {
        const { data } = await _supabase.from('pedidos').select('*').order('creado_en', { ascending: false });
        if (data) { 
            pedidosActuales = data; 
            actualizarComboClientes(data);
            actualizarInterfaz(data); 
        }
    }

    function actualizarComboClientes(lista) {
        const select = document.getElementById('cliente-select');
        const valorActual = select.value;
        const clientesUnicos = [...new Set(lista.map(p => p.cliente))].sort();
        
        select.innerHTML = '<option value="">-- Seleccionar cliente --</option><option value="NUEVO">+ Agregar nuevo cliente</option>';
        clientesUnicos.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c;
            opt.textContent = c;
            select.appendChild(opt);
        });
        select.value = valorActual;
    }

    function actualizarInterfaz(lista) {
        const tbody = document.getElementById('tabla-pedidos');
        tbody.innerHTML = '';
        let pen = 0, ent = 0;
        lista.forEach(p => {
            p.entregado ? ent++ : pen++;
            tbody.innerHTML += `
                <tr>
                    <td style="text-align: left; font-weight: bold; color: #0047ab;">${p.cliente}</td>
                    <td style="text-align: center;">${p.producto}</td>
                    <td style="text-align: center;">S/. ${(p.precio_total || 0).toFixed(2)}</td>
                    <td style="text-align: center;"><span class="badge ${p.entregado ? 'bg-success' : 'bg-warning'}">${p.entregado ? 'Listo' : 'Pendiente'}</span></td>
                    <td style="text-align: center;">
                        <div class="btn-actions">
                            ${!p.entregado ? `<button class="btn btn-sm btn-success shadow-sm" onclick="marcarEntregado(${p.id})">✓</button>` : ''}
                            <button class="btn btn-sm btn-danger shadow-sm" onclick="eliminarPedido(${p.id})">✕</button>
                        </div>
                    </td>
                </tr>`;
        });
        renderChart(pen, ent);
    }

    async function guardarPedido() {
        const select = document.getElementById('cliente-select');
        const inputNuevo = document.getElementById('cliente-nuevo');
        let clienteFinal = select.value === "NUEVO" ? inputNuevo.value.trim() : select.value;

        const producto = document.getElementById('producto').value.trim();
        const precio = parseFloat(document.getElementById('precio').value);

        if (clienteFinal && producto && !isNaN(precio)) {
            const { error } = await _supabase.from('pedidos').insert([
                { cliente: clienteFinal, producto: producto, precio_total: precio, entregado: false }
            ]);
            
            if (!error) {
                select.value = "";
                inputNuevo.value = "";
                inputNuevo.classList.add('hidden');
                document.getElementById('producto').value = ''; 
                document.getElementById('precio').value = '';
                cargarPedidos();
            } else {
                alert("Error al guardar: " + error.message);
            }
        } else {
            alert("Por favor completa todos los campos correctamente.");
        }
    }

    async function marcarEntregado(id) { await _supabase.from('pedidos').update({ entregado: true }).eq('id', id); cargarPedidos(); }
    async function eliminarPedido(id) { if(confirm("¿Seguro que deseas eliminar este registro?")) { await _supabase.from('pedidos').delete().eq('id', id); cargarPedidos(); } }

    // Función de Reporte con IGV
    function exportarExcelReal() {
        const info = pedidosActuales.map(p => {
            const total = p.precio_total || 0;
            const base = total / 1.18;
            const igv = total - base;
            return {
                "CLIENTE": p.cliente, 
                "PRODUCTO": p.producto, 
                "BASE IMPONIBLE": base.toFixed(2),
                "IGV (18%)": igv.toFixed(2),
                "TOTAL FINAL (S/.)": total.toFixed(2), 
                "ESTADO": p.entregado ? "Entregado" : "Pendiente",
                "LINK SISTEMA": "https://sistema-distribuidora-iota.vercel.app/"
            };
        });
        const ws = XLSX.utils.json_to_sheet(info);
        const wscols = [{wch: 35}, {wch: 25}, {wch: 15}, {wch: 15}, {wch: 18}, {wch: 15}, {wch: 45}];
        ws['!cols'] = wscols;
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Reporte_Ventas");
        XLSX.writeFile(wb, "Distribuidora_Chavez_PRO_Final.xlsx");
    }

    checkUser();
</script>
</body>
</html>
