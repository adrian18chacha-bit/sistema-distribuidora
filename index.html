<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribuidora Chávez | Panel Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

<div id="auth-section" class="flex items-center justify-center min-h-screen px-4">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-100">
        <div class="text-center mb-8">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg shadow-blue-200">
                <span class="text-white text-3xl font-bold">D</span>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Distribuidora Chávez</h1>
            <p class="text-slate-500 text-sm mt-1">Ingresa al sistema administrativo</p>
        </div>
        <div class="space-y-4">
            <input type="email" id="login-email" placeholder="Correo electrónico" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            <input type="password" id="login-password" placeholder="Contraseña" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all active:scale-95">Iniciar Sesión</button>
        </div>
    </div>
</div>

<div id="app-section" class="hidden">
    <nav class="bg-blue-700 text-white shadow-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-2 rounded-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                </div>
                <h2 class="text-xl font-bold tracking-tight uppercase">Distribuidora Chávez</h2>
            </div>
            <button onclick="logout()" class="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-lg text-sm font-semibold transition-all">Cerrar Sesión</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4 space-y-8">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <h3 class="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                        <span class="w-2 h-6 bg-blue-600 rounded-full"></span>
                        Nuevo Registro
                    </h3>
                    <div class="space-y-4 text-left">
                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase mb-2 block">Nombre del Cliente</label>
                            <select id="cliente-select" onchange="toggleNuevoCliente()" class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                                <option value="">Seleccionar cliente</option>
                                <option value="NUEVO" class="text-blue-600 font-bold">+ Agregar nuevo</option>
                            </select>
                            <input type="text" id="cliente-nuevo" placeholder="Escribir nombre completo..." class="hidden mt-3 w-full px-4 py-3 bg-white rounded-xl border-2 border-blue-100 outline-none">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase mb-2 block">Producto</label>
                            <input type="text" id="producto" placeholder="Ej: Bidón 20L" class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-200 outline-none">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-400 uppercase mb-2 block">Precio Total (S/.)</label>
                            <input type="number" id="precio" placeholder="0.00" class="w-full px-4 py-3 bg-slate-50 rounded-xl border border-slate-200 outline-none">
                        </div>
                        <button onclick="guardarPedido()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95">Guardar Pedido</button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-center">
                    <h3 class="text-sm font-bold text-slate-400 uppercase mb-4 text-left">Resumen de Entregas</h3>
                    <div class="relative h-48">
                        <canvas id="graficoEntregas"></canvas>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="p-6 border-b border-slate-50 bg-white">
                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div class="text-left">
                                <h3 class="font-bold text-slate-800 text-lg">Historial de Ventas</h3>
                                <p class="text-xs text-slate-400">Filtra y gestiona tus pedidos</p>
                            </div>
                            <div class="flex flex-wrap gap-2">
                                <div class="relative">
                                    <input type="text" id="buscador" onkeyup="filtrarPedidos()" placeholder="Buscar cliente..." class="pl-9 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none w-full md:w-48">
                                    <svg class="w-4 h-4 text-slate-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                                </div>
                                <select id="filtro-estado" onchange="filtrarPedidos()" class="px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none">
                                    <option value="TODOS">Todos</option>
                                    <option value="PENDIENTE">Pendientes</option>
                                    <option value="LISTO">Listos</option>
                                </select>
                                <button onclick="exportarExcelReal()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2">
                                    Descargar Excel
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-slate-400 text-xs font-bold uppercase">
                                <tr>
                                    <th class="px-6 py-4">Cliente</th>
                                    <th class="px-6 py-4 text-center">Producto</th>
                                    <th class="px-6 py-4 text-center">Total</th>
                                    <th class="px-6 py-4 text-center">Estado</th>
                                    <th class="px-6 py-4 text-center">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-pedidos" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const _supabase = supabase.createClient('https://ozdpcjhwbdsuqncgxfpz.supabase.co', 'sb_publishable_aBgdzg-JTQ61i1IkjUYysQ_4lYYJGPQ');
    let pedidosActuales = [];
    let chartObj = null;

    function filtrarPedidos() {
        const busqueda = document.getElementById('buscador').value.toLowerCase();
        const filtro = document.getElementById('filtro-estado').value;
        const filtrados = pedidosActuales.filter(p => {
            const matchNombre = p.cliente.toLowerCase().includes(busqueda);
            const status = p.entregado ? 'LISTO' : 'PENDIENTE';
            return matchNombre && (filtro === 'TODOS' || status === filtro);
        });
        actualizarTabla(filtrados, false);
    }

    function renderChart(p, e) {
        const ctx = document.getElementById('graficoEntregas').getContext('2d');
        if (chartObj) chartObj.destroy();
        chartObj = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: ['Pendiente', 'Listo'], datasets: [{ data: [p, e], backgroundColor: ['#f59e0b', '#10b981'], borderWidth: 0 }] },
            options: { maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom' } } }
        });
    }

    function toggleNuevoCliente() {
        const s = document.getElementById('cliente-select');
        const i = document.getElementById('cliente-nuevo');
        s.value === "NUEVO" ? i.classList.remove('hidden') : i.classList.add('hidden');
    }

    async function login() {
        const e = document.getElementById('login-email').value;
        const p = document.getElementById('login-password').value;
        const { error } = await _supabase.auth.signInWithPassword({ email: e, password: p });
        if (!error) checkUser(); else alert("Error de acceso");
    }

    async function logout() { await _supabase.auth.signOut(); location.reload(); }

    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            cargarPedidos();
        }
    }

    async function cargarPedidos() {
        const { data } = await _supabase.from('pedidos').select('*').order('creado_en', { ascending: false });
        if (data) { pedidosActuales = data; actualizarTabla(data, true); }
    }

    function actualizarTabla(lista, actualizarCombos) {
        if (actualizarCombos) {
            const s = document.getElementById('cliente-select');
            const v = s.value;
            const u = [...new Set(pedidosActuales.map(p => p.cliente))].sort();
            s.innerHTML = '<option value="">Seleccionar cliente</option><option value="NUEVO">+ Agregar nuevo</option>';
            u.forEach(c => s.innerHTML += `<option value="${c}">${c}</option>`);
            s.value = v;
        }
        const tbody = document.getElementById('tabla-pedidos');
        tbody.innerHTML = '';
        let pen = 0, ent = 0;
        lista.forEach(p => {
            p.entregado ? ent++ : pen++;
            tbody.innerHTML += `
                <tr class="hover:bg-slate-50">
                    <td class="px-6 py-4 font-semibold text-slate-700">${p.cliente}</td>
                    <td class="px-6 py-4 text-center text-slate-500">${p.producto}</td>
                    <td class="px-6 py-4 text-center font-bold text-blue-600">S/. ${(p.precio_total || 0).toFixed(2)}</td>
                    <td class="px-6 py-4 text-center">
                        <span class="px-3 py-1 rounded-full text-xs font-bold ${p.entregado ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}">
                            ${p.entregado ? 'Listo' : 'Pendiente'}
                        </span>
                    </td>
                    <td class="px-6 py-4 flex justify-center gap-2">
                        ${!p.entregado ? `<button onclick="marcarEntregado(${p.id})" class="text-emerald-500 hover:bg-emerald-50 p-2 rounded-lg">✓</button>` : ''}
                        <button onclick="eliminarPedido(${p.id})" class="text-rose-500 hover:bg-rose-50 p-2 rounded-lg">✕</button>
                    </td>
                </tr>`;
        });
        renderChart(pen, ent);
    }

    async function guardarPedido() {
        const s = document.getElementById('cliente-select');
        const i = document.getElementById('cliente-nuevo');
        let c = s.value === "NUEVO" ? i.value.trim() : s.value;
        const pr = document.getElementById('producto').value;
        const p = parseFloat(document.getElementById('precio').value);
        if (c && pr && p) {
            await _supabase.from('pedidos').insert([{ cliente: c, producto: pr, precio_total: p, entregado: false }]);
            s.value = ""; i.value = ""; i.classList.add('hidden');
            document.getElementById('producto').value = ''; document.getElementById('precio').value = '';
            cargarPedidos();
        }
    }

    async function marcarEntregado(id) { await _supabase.from('pedidos').update({ entregado: true }).eq('id', id); cargarPedidos(); }
    async function eliminarPedido(id) { if(confirm("¿Eliminar?")) { await _supabase.from('pedidos').delete().eq('id', id); cargarPedidos(); } }

    // --- FUNCIÓN EXCEL CORREGIDA ---
    function exportarExcelReal() {
        const info = pedidosActuales.map(p => {
            const t = p.precio_total || 0;
            return {
                "NOMBRE DEL CLIENTE": p.cliente, 
                "PRODUCTO": p.producto, 
                "BASE (S/.)": (t/1.18).toFixed(2), 
                "IGV (S/.)": (t-(t/1.18)).toFixed(2),
                "TOTAL FINAL": t.toFixed(2), 
                "ESTADO": p.entregado ? "Entregado" : "Pendiente"
            };
        });
        const ws = XLSX.utils.json_to_sheet(info);
        
        // AJUSTE DE ANCHOS DE COLUMNA (wch es el ancho en caracteres)
        const wscols = [
            {wch: 45}, // Cliente (Mucho más ancho)
            {wch: 25}, // Producto
            {wch: 15}, // Base
            {wch: 15}, // IGV
            {wch: 15}, // Total
            {wch: 15}  // Estado
        ];
        ws['!cols'] = wscols;

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Ventas");
        XLSX.writeFile(wb, "Reporte_Distribuidora_Chavez_PRO.xlsx");
    }

    checkUser();
</script>
</body>
</html>
