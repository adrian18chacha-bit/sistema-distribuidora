<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribuidora Chávez | Sistema Integral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

<div id="auth-section" class="flex items-center justify-center min-h-screen px-4">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-100">
        <div class="text-center mb-8">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg">
                <span class="text-white text-3xl font-bold">D</span>
            </div>
            <h1 class="text-2xl font-bold text-slate-800 uppercase">Distribuidora Chávez</h1>
        </div>
        <div class="space-y-4">
            <input type="email" id="login-email" placeholder="Correo" class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            <input type="password" id="login-password" placeholder="Contraseña" class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition-all">Entrar al Sistema</button>
        </div>
    </div>
</div>

<div id="app-section" class="hidden">
    <nav class="bg-blue-700 text-white shadow-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <h2 class="text-xl font-bold tracking-tight uppercase">Distribuidora Chávez</h2>
            <div class="flex items-center gap-4">
                <div class="hidden md:flex bg-white/10 rounded-lg p-1">
                    <button onclick="cambiarPestana('ventas')" class="px-4 py-2 rounded-md text-sm font-bold transition-all" id="btn-tab-ventas">Ventas</button>
                    <button onclick="cambiarPestana('gastos')" class="px-4 py-2 rounded-md text-sm font-bold transition-all" id="btn-tab-gastos">Gastos</button>
                </div>
                <button onclick="logout()" class="text-xs bg-white/10 hover:bg-white/20 px-3 py-2 rounded-lg font-semibold transition-all">Salir</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <p class="text-xs font-bold text-slate-400 uppercase">Total Ventas</p>
                <h4 class="text-2xl font-bold text-blue-600" id="resumen-ventas">S/. 0.00</h4>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <p class="text-xs font-bold text-slate-400 uppercase">Total Gastos</p>
                <h4 class="text-2xl font-bold text-rose-500" id="resumen-gastos">S/. 0.00</h4>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <p class="text-xs font-bold text-slate-400 uppercase">Utilidad Real</p>
                <h4 class="text-2xl font-bold text-emerald-600" id="resumen-utilidad">S/. 0.00</h4>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4 space-y-8">
                <div id="form-ventas" class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <h3 class="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                        <span class="w-2 h-6 bg-blue-600 rounded-full"></span> Nueva Venta
                    </h3>
                    <div class="space-y-4">
                        <select id="cliente-select" onchange="toggleNuevoCliente()" class="w-full px-4 py-3 bg-slate-50 rounded-xl border outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">Seleccionar cliente</option>
                            <option value="NUEVO">+ Agregar nuevo</option>
                        </select>
                        <input type="text" id="cliente-nuevo" placeholder="Nombre completo" class="hidden w-full px-4 py-3 bg-white border-2 border-blue-100 rounded-xl outline-none">
                        <input type="text" id="producto" placeholder="Producto" class="w-full px-4 py-3 bg-slate-50 rounded-xl border outline-none">
                        <input type="number" id="precio" placeholder="Precio Total S/." class="w-full px-4 py-3 bg-slate-50 rounded-xl border outline-none">
                        <button onclick="guardarPedido()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg active:scale-95">Registrar Venta</button>
                    </div>
                </div>

                <div id="form-gastos" class="hidden bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <h3 class="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                        <span class="w-2 h-6 bg-rose-500 rounded-full"></span> Nuevo Gasto
                    </h3>
                    <div class="space-y-4">
                        <input type="text" id="gasto-desc" placeholder="Descripción (Ej: Gasolina)" class="w-full px-4 py-3 bg-slate-50 rounded-xl border outline-none">
                        <input type="number" id="gasto-monto" placeholder="Monto S/." class="w-full px-4 py-3 bg-slate-50 rounded-xl border outline-none">
                        <button onclick="guardarGasto()" class="w-full bg-rose-500 hover:bg-rose-600 text-white font-bold py-4 rounded-2xl transition-all shadow-lg active:scale-95">Registrar Gasto</button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-center">
                    <h3 class="text-sm font-bold text-slate-400 uppercase mb-4 text-left">Estado de Pedidos</h3>
                    <div class="relative h-48"><canvas id="graficoEntregas"></canvas></div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div id="tabla-ventas-container" class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="p-6 border-b flex flex-col md:flex-row justify-between items-center gap-4">
                        <h3 class="font-bold text-lg">Historial de Ventas</h3>
                        <div class="flex gap-2 w-full md:w-auto">
                            <input type="text" id="buscador" onkeyup="filtrarPedidos()" placeholder="Buscar..." class="px-4 py-2 bg-slate-50 border rounded-xl text-sm outline-none w-full">
                            <button onclick="exportarExcelReal()" class="bg-emerald-500 text-white px-4 rounded-xl text-sm font-bold">Excel</button>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-xs font-bold uppercase text-slate-400">
                                <tr>
                                    <th class="px-6 py-4">Cliente</th>
                                    <th class="px-6 py-4 text-center">Pedido</th>
                                    <th class="px-6 py-4 text-center">Total</th>
                                    <th class="px-6 py-4 text-center">Estado</th>
                                    <th class="px-6 py-4 text-center">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-pedidos" class="divide-y"></tbody>
                        </table>
                    </div>
                </div>

                <div id="tabla-gastos-container" class="hidden bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="p-6 border-b flex justify-between items-center">
                        <h3 class="font-bold text-lg">Registro de Gastos</h3>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-xs font-bold uppercase text-slate-400">
                                <tr>
                                    <th class="px-6 py-4">Descripción</th>
                                    <th class="px-6 py-4 text-center">Fecha</th>
                                    <th class="px-6 py-4 text-center">Monto</th>
                                    <th class="px-6 py-4 text-center">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-gastos-body" class="divide-y"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const _supabase = supabase.createClient('https://ozdpcjhwbdsuqncgxfpz.supabase.co', 'sb_publishable_aBgdzg-JTQ61i1IkjUYysQ_4lYYJGPQ');
    let pedidosActuales = [];
    let gastosActuales = [];
    let chartObj = null;

    function cambiarPestana(tab) {
        const esVentas = tab === 'ventas';
        document.getElementById('form-ventas').classList.toggle('hidden', !esVentas);
        document.getElementById('tabla-ventas-container').classList.toggle('hidden', !esVentas);
        document.getElementById('form-gastos').classList.toggle('hidden', esVentas);
        document.getElementById('tabla-gastos-container').classList.toggle('hidden', esVentas);
        
        document.getElementById('btn-tab-ventas').className = esVentas ? "px-4 py-2 rounded-md text-sm font-bold bg-white text-blue-700 shadow-sm" : "px-4 py-2 rounded-md text-sm font-bold text-white hover:bg-white/10";
        document.getElementById('btn-tab-gastos').className = !esVentas ? "px-4 py-2 rounded-md text-sm font-bold bg-white text-rose-600 shadow-sm" : "px-4 py-2 rounded-md text-sm font-bold text-white hover:bg-white/10";
    }

    async function login() {
        const e = document.getElementById('login-email').value;
        const p = document.getElementById('login-password').value;
        const { error } = await _supabase.auth.signInWithPassword({ email: e, password: p });
        if (!error) checkUser(); else alert("Error de acceso");
    }

    async function logout() { await _supabase.auth.signOut(); location.reload(); }

    async function checkUser() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            cambiarPestana('ventas');
            cargarTodo();
        }
    }

    async function cargarTodo() {
        const { data: p } = await _supabase.from('pedidos').select('*').order('creado_en', { ascending: false });
        const { data: g } = await _supabase.from('gastos').select('*').order('creado_en', { ascending: false });
        pedidosActuales = p || [];
        gastosActuales = g || [];
        actualizarInterfaz();
    }

    function actualizarInterfaz() {
        // Actualizar Ventas
        const tbodyV = document.getElementById('tabla-pedidos');
        tbodyV.innerHTML = '';
        let tVentas = 0, pen = 0, ent = 0;
        pedidosActuales.forEach(p => {
            tVentas += (p.precio_total || 0);
            p.entregado ? ent++ : pen++;
            tbodyV.innerHTML += `<tr class="hover:bg-slate-50"><td class="px-6 py-4 font-semibold">${p.cliente}</td><td class="px-6 py-4 text-center">${p.producto}</td><td class="px-6 py-4 text-center font-bold text-blue-600">S/. ${(p.precio_total || 0).toFixed(2)}</td><td class="px-6 py-4 text-center"><span class="px-3 py-1 rounded-full text-xs font-bold ${p.entregado ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}">${p.entregado ? 'Listo' : 'Pendiente'}</span></td><td class="px-6 py-4 flex justify-center gap-2">${!p.entregado ? `<button onclick="marcarEntregado(${p.id})" class="text-emerald-500 hover:bg-emerald-50 p-2 rounded-lg">✓</button>` : ''}<button onclick="eliminarPedido(${p.id})" class="text-rose-500 hover:bg-rose-50 p-2 rounded-lg">✕</button></td></tr>`;
        });

        // Actualizar Gastos
        const tbodyG = document.getElementById('tabla-gastos-body');
        tbodyG.innerHTML = '';
        let tGastos = 0;
        gastosActuales.forEach(g => {
            tGastos += (g.monto || 0);
            const fecha = new Date(g.creado_en).toLocaleDateString();
            tbodyG.innerHTML += `<tr class="hover:bg-slate-50"><td class="px-6 py-4 font-semibold">${g.descripcion}</td><td class="px-6 py-4 text-center text-slate-500">${fecha}</td><td class="px-6 py-4 text-center font-bold text-rose-500">S/. ${(g.monto || 0).toFixed(2)}</td><td class="px-6 py-4 text-center"><button onclick="eliminarGasto(${g.id})" class="text-rose-500 hover:bg-rose-50 p-2 rounded-lg text-sm">Eliminar</button></td></tr>`;
        });

        // Actualizar Resumen
        document.getElementById('resumen-ventas').textContent = `S/. ${tVentas.toFixed(2)}`;
        document.getElementById('resumen-gastos').textContent = `S/. ${tGastos.toFixed(2)}`;
        document.getElementById('resumen-utilidad').textContent = `S/. ${(tVentas - tGastos).toFixed(2)}`;
        
        // Actualizar Combo
        const s = document.getElementById('cliente-select');
        const v = s.value;
        const u = [...new Set(pedidosActuales.map(p => p.cliente))].sort();
        s.innerHTML = '<option value="">Seleccionar cliente</option><option value="NUEVO">+ Agregar nuevo</option>';
        u.forEach(c => s.innerHTML += `<option value="${c}">${c}</option>`);
        s.value = v;

        renderChart(pen, ent);
    }

    async function guardarGasto() {
        const d = document.getElementById('gasto-desc').value;
        const m = parseFloat(document.getElementById('gasto-monto').value);
        if (d && !isNaN(m)) {
            await _supabase.from('gastos').insert([{ descripcion: d, monto: m }]);
            document.getElementById('gasto-desc').value = ''; document.getElementById('gasto-monto').value = '';
            cargarTodo();
        }
    }

    async function eliminarGasto(id) { if(confirm("¿Eliminar gasto?")) { await _supabase.from('gastos').delete().eq('id', id); cargarTodo(); } }

    // Reutilizamos tus funciones previas de pedidos (filtrar, guardar, marcar, borrar) adaptadas a cargarTodo()
    function filtrarPedidos() {
        const b = document.getElementById('buscador').value.toLowerCase();
        const filt = pedidosActuales.filter(p => p.cliente.toLowerCase().includes(b));
        const tbodyV = document.getElementById('tabla-pedidos');
        tbodyV.innerHTML = '';
        filt.forEach(p => {
            tbodyV.innerHTML += `<tr class="hover:bg-slate-50"><td class="px-6 py-4 font-semibold">${p.cliente}</td><td class="px-6 py-4 text-center">${p.producto}</td><td class="px-6 py-4 text-center font-bold text-blue-600">S/. ${(p.precio_total || 0).toFixed(2)}</td><td class="px-6 py-4 text-center"><span class="px-3 py-1 rounded-full text-xs font-bold ${p.entregado ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'}">${p.entregado ? 'Listo' : 'Pendiente'}</span></td><td class="px-6 py-4 flex justify-center gap-2">${!p.entregado ? `<button onclick="marcarEntregado(${p.id})" class="text-emerald-500 hover:bg-emerald-50 p-2 rounded-lg">✓</button>` : ''}<button onclick="eliminarPedido(${p.id})" class="text-rose-500 hover:bg-rose-50 p-2 rounded-lg">✕</button></td></tr>`;
        });
    }

    async function guardarPedido() {
        const s = document.getElementById('cliente-select');
        const i = document.getElementById('cliente-nuevo');
        let c = s.value === "NUEVO" ? i.value.trim() : s.value;
        const pr = document.getElementById('producto').value;
        const p = parseFloat(document.getElementById('precio').value);
        if (c && pr && p) {
            await _supabase.from('pedidos').insert([{ cliente: c, producto: pr, precio_total: p, entregado: false }]);
            s.value = ""; i.value = ""; i.classList.add('hidden');
            document.getElementById('producto').value = ''; document.getElementById('precio').value = '';
            cargarTodo();
        }
    }

    async function marcarEntregado(id) { await _supabase.from('pedidos').update({ entregado: true }).eq('id', id); cargarTodo(); }
    async function eliminarPedido(id) { if(confirm("¿Eliminar?")) { await _supabase.from('pedidos').delete().eq('id', id); cargarTodo(); } }

    function renderChart(p, e) {
        const ctx = document.getElementById('graficoEntregas').getContext('2d');
        if (chartObj) chartObj.destroy();
        chartObj = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: ['Pendiente', 'Listo'], datasets: [{ data: [p, e], backgroundColor: ['#f59e0b', '#10b981'], borderWidth: 0 }] },
            options: { maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'bottom' } } }
        });
    }

    function toggleNuevoCliente() {
        const s = document.getElementById('cliente-select');
        const i = document.getElementById('cliente-nuevo');
        s.value === "NUEVO" ? i.classList.remove('hidden') : i.classList.add('hidden');
    }

    function exportarExcelReal() {
        const info = pedidosActuales.map(p => {
            const t = p.precio_total || 0;
            return { "CLIENTE": p.cliente, "PEDIDO": p.producto, "BASE": (t/1.18).toFixed(2), "IGV": (t-(t/1.18)).toFixed(2), "TOTAL": t.toFixed(2), "ESTADO": p.entregado ? "Listo" : "Pendiente" };
        });
        const ws = XLSX.utils.json_to_sheet(info);
        const wscols = [{wch: 40}, {wch: 25}, {wch: 12}, {wch: 12}, {wch: 12}, {wch: 15}];
        ws['!cols'] = wscols;
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Ventas");
        XLSX.writeFile(wb, "Reporte_Distribuidora_Chavez.xlsx");
    }

    checkUser();
</script>
</body>
</html>
